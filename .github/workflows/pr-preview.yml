# Posts a tap-to-open preview link on every PR, so changes can be reviewed on a
# phone without merging to the live site. This repo is a static GitHub Pages
# site, so we serve the PR's exact commit through raw.githack.com (an https CDN
# over raw GitHub files) - https means the mic-based tuner works on mobile too.
#
# NOTE: pull_request workflows run from the *base* branch, so this only starts
# commenting once it has landed on `main`.
name: PR preview link

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            const base = `https://raw.githack.com/${owner}/${repo}/${sha}`;

            // Drive the preview list off the manifest at this exact commit so a
            // new profile lands in the comment automatically. Label comes out
            // of the profile JS itself (the `label: "..."` field). If anything
            // in the read fails, fall back to a small hardcoded set so the PR
            // still gets a usable comment.
            async function readPath(path) {
              const res = await github.rest.repos.getContent({ owner, repo, path, ref: sha });
              return Buffer.from(res.data.content, 'base64').toString('utf8');
            }
            let apps;
            try {
              const manifest = JSON.parse(await readPath('music/shared/profiles/manifest.json'));
              apps = [];
              for (const id of manifest.profiles) {
                let label = id;
                try {
                  const js = await readPath(`music/shared/profiles/${id}.js`);
                  const m = js.match(/label:\s*["']([^"']+)["']/);
                  if (m) label = m[1];
                } catch (e) { /* leave label as id */ }
                apps.push([label, `${base}/music/play/?p=${id}`]);
              }
            } catch (e) {
              core.warning(`manifest read failed: ${e.message}; falling back to hardcoded list`);
              apps = [
                ['Guitar', `${base}/music/play/?p=guitar-standard`],
                ['Ukulele', `${base}/music/play/?p=ukulele-gcea`],
                ['Mandolin', `${base}/music/play/?p=mandolin-gdae`],
              ];
            }
            const marker = '<!-- pr-preview-bot -->';
            const body = [
              marker,
              '### 🎸 Live preview (no merge needed)',
              '',
              'Open on your phone — https, so the mic tuner works:',
              '',
              ...apps.map(([n, u]) => `- **${n}** — ${u}`),
              '',
              `_Serving commit \`${sha.slice(0, 7)}\` via githack. After merge it goes live at https://${owner}.github.io/music/play/_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
            }
