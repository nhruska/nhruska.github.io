# Posts a tap-to-open preview link on every PR, so changes can be reviewed on a
# phone without merging to the live site. This repo is a static GitHub Pages
# site, so we serve the PR's exact commit through raw.githack.com (an https CDN
# over raw GitHub files) - https means the mic-based tuner works on mobile too.
#
# NOTE: when this workflow file is FIRST added in a PR, it does not run for
# that initial PR (GitHub doesn't know the workflow exists from main yet).
# Once it's landed on main, subsequent PRs run the workflow as it exists on
# THEIR head SHA - so workflow edits in a PR DO apply to that same PR's runs.
name: PR preview link

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;
            const branch = pr.head.ref;
            // Fork PRs: the head commit + files live in the FORK repo, not base
            // owner/repo - use the head repo for githack + the content reads so a
            // fork preview resolves (falls back to base for same-repo PRs).
            const hOwner = (pr.head.repo && pr.head.repo.owner && pr.head.repo.owner.login) || owner;
            const hName = (pr.head.repo && pr.head.repo.name) || repo;
            const base = `https://raw.githack.com/${hOwner}/${hName}/${sha}`;
            // Encode each branch path segment but keep the slashes literal so the
            // GitHub tree URL for a slashed branch (claude/foo) still resolves and
            // a `)`/`#`/`%` in a branch can't break the Markdown link href.
            const branchPath = String(branch).split('/').map(encodeURIComponent).join('/');
            const branchUrl = `https://github.com/${hOwner}/${hName}/tree/${branchPath}`;
            // Branch-form githack root: the DEFAULT for the tuning links so the preview
            // tracks the latest push (slashed branch names resolve on githack). The
            // commit-pinned `base` (githack at the SHA) is offered as the "Commit
            // preview" link for isolated per-commit testing.
            const baseBranch = `https://raw.githack.com/${hOwner}/${hName}/${branchPath}`;
            const liveUrl = `https://${owner}.github.io/music/play/`;
            // The profile label + branch are PR-controlled; truncate FIRST, THEN
            // escape Markdown-active chars, so a slice can't sever an escape pair
            // and leave a dangling backslash that eats the closing bracket.
            const mdText = (s) => String(s == null ? '' : s).replace(/[\r\n]+/g, ' ').slice(0, 60).replace(/[\\`*_{}\[\]()#+\-.!|<>]/g, '\\$&');

            // Drive the preview list off the manifest at the head commit so a new
            // profile lands automatically. Reads from the HEAD repo (fork-safe).
            async function readPath(path) {
              const res = await github.rest.repos.getContent({ owner: hOwner, repo: hName, path, ref: sha });
              return Buffer.from(res.data.content, 'base64').toString('utf8');
            }
            let apps;
            try {
              const manifest = JSON.parse(await readPath('music/shared/profiles/manifest.json'));
              apps = [];
              for (const id of manifest.profiles) {
                let label = id;
                try {
                  const js = await readPath(`music/shared/profiles/${id}.js`);
                  const m = js.match(/label:\s*["']([^"']+)["']/);
                  if (m) label = m[1];
                } catch (e) { /* leave label as id */ }
                apps.push([mdText(label), `${baseBranch}/music/play/?p=${encodeURIComponent(id)}`]);
              }
            } catch (e) {
              core.warning(`manifest read failed: ${e.message}; falling back to hardcoded list`);
              apps = [
                ['Guitar', `${baseBranch}/music/play/?p=guitar-standard`],
                ['Ukulele', `${baseBranch}/music/play/?p=ukulele-gcea`],
                ['Mandolin', `${baseBranch}/music/play/?p=mandolin-gdae`],
              ];
            }
            const marker = '<!-- pr-preview-bot -->';
            // Concise CTA: link TEXT only (no raw URLs), all instrument profiles
            // inline, plus commit / branch / deployed as labelled links.
            const body = [
              marker,
              '### Live preview - tap to open on your phone',
              '',
              '**Try a tuning:** ' + apps.map(([n, u]) => `[${n}](${u})`).join(' · '),
              '',
              `**Commit preview** [\`${sha.slice(0, 7)}\`](${base}/music/play/) (pin for isolated testing) · **Branch** [${mdText(branch)}](${branchUrl}) · **Deployed** [live site](${liveUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
            }
