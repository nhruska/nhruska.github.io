# Nightly Command Center snapshot refresh (free: public repo = unmetered minutes).
# main is NOT branch-protected on GitHub (verified 2026-07-05); the workflow
# commits the payload directly - a docs-only data refresh, no code paths.
# Session-start agent refresh remains the correctness guarantee; this keeps
# the deployed dashboard fresh for morning glances.
name: cc-nightly
on:
  schedule:
    - cron: '23 9 * * *'   # 09:23 UTC ~ 05:23 ET, off-minute per fleet etiquette
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vendored panelkit drift check
        # Self-integrity layer (body vs stamp); the SSOT layer self-SKIPs
        # here (no claude-config checkout in CI). Drift fails the nightly
        # loudly instead of silently regenerating from a hand-edited copy.
        run: python3 scripts/vendor-check.py
      - name: Generate payload
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/command-center-gen.py
      - name: Commit if changed
        # llms.txt is the payload's agent-readable twin (written by the same
        # generator run) - commit them together or the deployed twin drifts.
        # add-then-diff --cached so a first-ever llms.txt (untracked) counts.
        run: |
          git config user.name "cc-nightly"
          git config user.email "actions@users.noreply.github.com"
          git add docs/artifacts/cc/payload-repo.json docs/artifacts/cc/llms.txt
          if ! git diff --cached --quiet; then
            git commit -m "cc: nightly snapshot refresh"
            git push
          else
            echo "no material change"
          fi
