# Auto-retry a transient GitHub Pages deploy failure once.
#
# The built-in "pages-build-deployment" workflow occasionally fails on GitHub's
# serving step ("Deployment failed, try again later") even though the build job
# passed - a transient GitHub-side blip, not a content problem. When that happens
# the merged commit never reaches the live site until someone re-runs the deploy
# by hand (this stranded PRs #93, #94 and #96 behind a ~1.5h Pages incident on
# 2026-07-03).
#
# This watcher re-runs the failed deploy exactly once. It fires only on the FIRST
# attempt's failure (run_attempt == 1), so a genuinely persistent failure surfaces
# after one retry instead of looping.
#
# Notes:
# - workflow_run triggers only register from the file on the repo's DEFAULT branch,
#   so this takes effect once merged to main (not from the PR branch).
# - It re-runs only the failed job(s), so a passed build isn't rebuilt.
name: Retry failed Pages deploy

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]

# Least privilege: re-running a workflow run needs actions:write only.
permissions:
  actions: write

jobs:
  retry:
    # Only a first-attempt failure. A retried run reports run_attempt >= 2, so a
    # second failure is left alone (no retry loop).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - name: Re-run the failed Pages deploy once
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          echo "pages-build-deployment run $RUN_ID failed on attempt ${{ github.event.workflow_run.run_attempt }}; re-running failed jobs."
          gh run rerun "$RUN_ID" --failed --repo "$REPO"
