<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cockpit - Angle B: Tempo</title>
<link rel="icon" href="https://problemsolutions.github.io/logo-badge.svg" type="image/svg+xml">
<link rel="stylesheet" href="cockpit.css">
<style>
/* Angle B local: TIME is the centerpiece - flight-strip swimlanes + NOW line.
   Desktop: horizontal lanes. Mobile: a vertical time rail, newest first. */
.zoom{display:flex;gap:6px;margin:2px 0 8px}
.zoom .z{min-height:44px;padding:0 14px;border:1px solid var(--line2);border-radius:10px;
  background:var(--card);color:var(--dim);font:700 .68rem var(--mono);letter-spacing:.08em;cursor:pointer}
.zoom .z.on{color:var(--acc);border-color:var(--acc);background:var(--accg)}
/* horizontal board (desktop) */
.board{position:relative;overflow-x:auto}
.lane{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin:7px 0}
.lane .ln{font:700 .72rem var(--mono);color:var(--dim);display:flex;gap:7px;align-items:center}
.lane .track{position:relative;height:44px;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.blk{position:absolute;top:6px;bottom:6px;border-radius:7px;font:700 .62rem/1.2 var(--mono);
  color:var(--txt);display:flex;align-items:center;padding:0 8px;white-space:nowrap;overflow:hidden;
  cursor:pointer;border:1px solid transparent}
.blk.ok{background:var(--okg);border-color:var(--ok)} .blk.run{background:var(--rung);border-color:var(--run)}
.blk.warn{background:var(--warng);border-color:var(--warn)} .blk.hold{background:var(--card2);border-color:var(--line2)}
.nowline{position:absolute;top:0;bottom:0;width:2px;background:var(--bad);z-index:5}
.nowline::after{content:'NOW';position:absolute;top:-1px;left:5px;font:700 .55rem var(--mono);color:var(--bad);letter-spacing:.1em}
.axis{display:grid;grid-template-columns:110px 1fr;gap:8px;margin-top:2px}
.axis .ticks{display:flex;justify-content:space-between;font:600 .58rem var(--mono);color:var(--faint)}
/* vertical rail (mobile) */
.rail{display:none}
@media (max-width:899px){
  .board,.axis{display:none}
  .rail{display:block;position:relative;padding-left:20px}
  .rail::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--line2)}
  .rev{position:relative;margin:10px 0}
  .rev::before{content:'';position:absolute;left:-17px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--faint)}
  .rev.ok::before{background:var(--ok)} .rev.run::before{background:var(--run);box-shadow:0 0 6px var(--run)}
  .rev.warn::before{background:var(--warn)} .rev.now::before{background:var(--bad);box-shadow:0 0 8px var(--bad)}
  .rev .rt{font:600 .6rem var(--mono);color:var(--faint);letter-spacing:.06em}
}
.gate{display:flex;align-items:center;gap:9px;background:var(--card);border:1px dashed var(--line2);
  border-radius:10px;padding:8px 12px;margin:6px 0;min-height:44px}
.gate .gt{font:700 .7rem var(--mono);color:var(--warn);flex:0 0 auto}
.gate .gn{font:600 .8rem/1.3 var(--sans)}
</style>
</head>
<body>
<div class="deck" id="app"></div>
<script src="cockpit-data.js"></script>
<script>
(function(){
'use strict';
var C = window.Cockpit, S = C.SNAP, esc = C.esc;

/* Last-24h tempo blocks per lane: [lane, missionId, label, state, startPct, widthPct] */
var BLOCKS = [
  ['music',  'ui-reconcile', 'S-UI-RECONCILE swarm #230-#234', 'ok',   22, 30],
  ['music',  'setrm',        '#235 arm grammar',               'ok',   58, 10],
  ['music',  'eartest',      '#88 ear test',                   'warn', 74, 18],
  ['config', 'ce',           'CE loop - rules + reconciles',   'run',  10, 62],
  ['ai-os',  'cockpit',      'Cockpit v2 - THIS MISSION',      'run',  62, 30],
  ['req',    'iv1',          'IV-1 interview queued',          'hold', 70, 22]
];
var NOW = 72; /* percent across the 24h window */

var lanesHtml = ['music', 'config', 'ai-os', 'req'].map(function(ln){
  var blks = BLOCKS.filter(function(b){ return b[0] === ln; }).map(function(b){
    return '<div class="blk ' + b[3] + '" data-mission="' + b[1] + '" style="left:' + b[4] + '%;width:' + b[5] + '%">' + esc(b[2]) + '</div>';
  }).join('');
  var led = ln === 'ai-os' ? 'run' : ln === 'req' ? 'idle' : 'ok';
  return '<div class="lane"><span class="ln"><span class="led ' + led + '"></span>' + ln + '</span><div class="track">' + blks + '</div></div>';
}).join('');

var railHtml = [
  ['now',  'NOW',    'Cockpit v2 in flight - 3 angles rendering', 'cockpit'],
  ['ok',   '03:05Z', '#235 setlist arm grammar merged (v150)', 'setrm'],
  ['ok',   '00:56Z', 'S-UI-RECONCILE swarm CLOSED - 5 PRs, v146-v149', 'ui-reconcile'],
  ['warn', 'OPEN',   'Ear test #88 waits on your call', 'eartest'],
  ['run',  '24H',    'CE loop steady - config reconciles riding along', 'ce']
].map(function(r){
  return '<div class="rev ' + r[0] + '"><div class="rt">' + r[1] + '</div>'
    + '<div class="strip ' + (r[0] === 'now' ? 'run' : r[0]) + '" data-mission="' + r[3] + '" style="margin:3px 0"><div class="sbody"><div class="sname">' + esc(r[2]) + '</div></div></div></div>';
}).join('');

var gatesHtml = S.gates.map(function(g){
  return '<div class="gate"><span class="gt">' + esc(g.at) + '</span><span class="gn">' + esc(g.name) + '</span></div>';
}).join('');

document.getElementById('app').innerHTML =
  C.header('ANGLE B - TEMPO')
  + C.sigbar()
  + '<div class="cols"><div>'
  + '<div class="panel"><div class="lbl"><span class="led run"></span>Ops tempo - last 24h<span class="spacer"></span></div>'
  + '<div class="zoom"><button class="z" type="button">ORG</button><button class="z on" type="button">PORTFOLIO</button><button class="z" type="button">PROJECT</button></div>'
  + '<div class="board">' + lanesHtml + '<div class="nowline" style="left:calc(110px + (100% - 118px) * ' + (NOW / 100) + ' + 8px)"></div></div>'
  + '<div class="axis"><span></span><div class="ticks"><span>-24H</span><span>-18H</span><span>-12H</span><span>-6H</span><span>NOW</span><span>AHEAD</span></div></div>'
  + '<div class="rail">' + railHtml + '</div>'
  + '</div>'
  + '<div class="panel"><div class="lbl"><span class="led warn"></span>Gates ahead of now</div>' + gatesHtml + '</div>'
  + '</div><div>'
  + '<div class="panel"><div class="lbl"><span class="led warn"></span>Your turn</div>' + C.queueCards(3) + '</div>'
  + '</div></div>'
  + C.ticker();

C.wire(document.getElementById('app'));
C.overlay();
})();
</script>
</body>
</html>
