<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cockpit - Angle A: Instruments</title>
<link rel="icon" href="https://problemsolutions.github.io/logo-badge.svg" type="image/svg+xml">
<link rel="stylesheet" href="cockpit.css">
<style>
/* Angle A local: the instrument cluster replaces the map. */
.cluster{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media (min-width:900px){.cluster{grid-template-columns:repeat(3,1fr)}}
.inst{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-height:120px;cursor:pointer}
.inst:active{border-color:var(--acc)}
.inst svg{display:block;margin:4px auto 0}
.inst .iv{font:700 1.05rem/1.2 var(--mono);text-align:center}
.inst .iv small{font:600 .6rem/1.4 var(--mono);color:var(--faint);display:block;letter-spacing:.08em}
.segbar{display:flex;gap:3px;height:14px;margin:14px 0 6px}
.segbar i{flex:1;border-radius:3px;background:var(--card2)}
.segbar i.tap{background:var(--acc)} .segbar i.digit{background:var(--ok)}
.segbar i.burst{background:var(--warn)} .segbar i.interview{background:var(--run)}
.lvl{display:flex;gap:4px;margin:16px 0 8px}
.lvl i{flex:1;height:16px;border-radius:3px;background:var(--card2)}
.lvl i.on{background:var(--ok)}
.fleet{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.fleet .fr{display:flex;align-items:center;gap:8px;font:600 .74rem var(--mono)}
.fleet .fr .spacer{flex:1}
</style>
</head>
<body>
<div class="deck" id="app"></div>
<script src="cockpit-data.js"></script>
<script>
(function(){
'use strict';
var C = window.Cockpit, S = C.SNAP, esc = C.esc;

function arcGauge(val, max, unit, color){
  var pct = Math.min(1, val / max), a = -120 + 240 * pct, r = 44;
  function pt(deg){ var rad = (deg - 90) * Math.PI / 180; return (60 + r * Math.cos(rad)).toFixed(1) + ' ' + (60 + r * Math.sin(rad)).toFixed(1); }
  function arc(from, to, stroke, w){
    var large = (to - from) > 180 ? 1 : 0;
    return '<path d="M ' + pt(from) + ' A ' + r + ' ' + r + ' 0 ' + large + ' 1 ' + pt(to) + '" fill="none" stroke="' + stroke + '" stroke-width="' + w + '" stroke-linecap="round"/>';
  }
  return '<svg width="120" height="86" viewBox="0 0 120 92">'
    + arc(-120, 120, 'var(--card2)', 9) + arc(-120, a, color, 9)
    + '<text x="60" y="66" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="22" fill="var(--txt)">' + val + '</text>'
    + '<text x="60" y="82" text-anchor="middle" font-family="var(--mono)" font-size="9" letter-spacing="1" fill="var(--faint)">' + unit + '</text></svg>';
}
function donut(pct, color){
  var r = 34, c = 2 * Math.PI * r;
  return '<svg width="110" height="86" viewBox="0 0 110 86">'
    + '<circle cx="55" cy="43" r="' + r + '" fill="none" stroke="var(--card2)" stroke-width="9"/>'
    + '<circle cx="55" cy="43" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="9" stroke-linecap="round" stroke-dasharray="' + (c * pct / 100).toFixed(1) + ' ' + c.toFixed(1) + '" transform="rotate(-90 55 43)"/>'
    + '<text x="55" y="49" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="19" fill="var(--txt)">' + pct + '%</text></svg>';
}
function radar(skills){
  var cx = 60, cy = 48, R = 38, n = skills.length;
  function pt(i, f){ var a = -Math.PI / 2 + i * 2 * Math.PI / n; return (cx + R * f * Math.cos(a)).toFixed(1) + ',' + (cy + R * f * Math.sin(a)).toFixed(1); }
  var grid = [0.33, 0.66, 1].map(function(f){ return '<polygon points="' + skills.map(function(_, i){ return pt(i, f); }).join(' ') + '" fill="none" stroke="var(--card2)" stroke-width="1"/>'; }).join('');
  var shape = '<polygon points="' + skills.map(function(s, i){ return pt(i, s.score / 100); }).join(' ') + '" fill="var(--accg)" stroke="var(--acc)" stroke-width="2"/>';
  var labels = skills.map(function(s, i){ var a = -Math.PI / 2 + i * 2 * Math.PI / n; var x = cx + (R + 11) * Math.cos(a), y = cy + (R + 11) * Math.sin(a) + 3; return '<text x="' + x.toFixed(0) + '" y="' + y.toFixed(0) + '" text-anchor="middle" font-family="var(--mono)" font-size="7.5" fill="var(--dim)">' + esc(s.skill.slice(0, 6).toUpperCase()) + '</text>'; }).join('');
  return '<svg width="130" height="100" viewBox="-4 -6 128 110">' + grid + shape + labels + '</svg>';
}

var forms = { tap: 1, digit: 1, burst: 2, interview: 1 };
var segs = '';
S.queue.forEach(function(q){ segs += '<i class="' + q.form + '"></i>'; });

var fleet = [];
S.departments.forEach(function(d){ d.projects.forEach(function(p){
  fleet.push('<div class="fr"><span class="led ' + (p.status === 'ok' ? 'ok' : p.status === 'warn' ? 'warn' : 'idle') + '"></span>' + esc(p.name) + '<span class="spacer"></span>' + esc(p.ver) + '</div>');
}); });

var tiles = '';
S.departments.forEach(function(d){ d.projects.forEach(function(p){
  tiles += '<div class="tile" data-project="' + p.id + '"><div class="trow"><span class="led ' + (p.status === 'ok' ? 'ok' : p.status === 'warn' ? 'warn' : 'idle') + '"></span><span class="tname">' + esc(p.name) + '</span></div>'
    + '<div class="tstats"><span class="tstat">' + p.attention + '<small>NEEDS</small></span><span class="tstat">' + p.running + '<small>RUN</small></span><span class="tstat">' + p.wins + '<small>WINS</small></span></div></div>';
}); });

document.getElementById('app').innerHTML =
  C.header('ANGLE A - INSTRUMENTS')
  + C.sigbar()
  + '<div class="cols"><div>'
  + '<div class="panel"><div class="lbl"><span class="led run"></span>Instrument cluster<span class="spacer"></span><span class="lbl" style="color:var(--faint)">derived state - tap any instrument to drill</span></div>'
  + '<div class="cluster">'
  + '<div class="inst" id="iTempo"><span class="lbl">Ops tempo</span>' + arcGauge(S.shipped24, 20, 'MERGES / 24H', 'var(--ok)') + '</div>'
  + '<div class="inst" id="iAtt"><span class="lbl">Attention load</span><div class="segbar">' + segs + '</div><div class="iv">' + S.needsMe + '<small>ITEMS BY FORM - TAP DIGIT BURST INTERVIEW</small></div></div>'
  + '<div class="inst"><span class="lbl">Autonomy ratio</span>' + donut(85, 'var(--run)') + '<div class="iv"><small>MERGES WITHOUT A KEYSTROKE</small></div></div>'
  + '<div class="inst"><span class="lbl">Blocker level</span><div class="lvl"><i class="on"></i><i></i><i></i><i></i><i></i></div><div class="iv">1 / 5<small>NOTHING RED - 1 EAR TEST OPEN</small></div></div>'
  + '<div class="inst"><span class="lbl">Fleet CI</span><div class="fleet">' + fleet.join('') + '</div></div>'
  + '<div class="inst" id="iComp"><span class="lbl">Competency - music</span>' + radar(S.competency) + '</div>'
  + '</div></div>'
  + '<div class="panel"><div class="lbl">Projects - portfolio altitude</div><div class="tilegrid">' + tiles + '</div></div>'
  + '</div><div>'
  + '<div class="panel"><div class="lbl"><span class="led warn"></span>Your turn - top of the stream</div>' + C.queueCards(3) + '</div>'
  + '</div></div>'
  + C.ticker();

C.wire(document.getElementById('app'));
document.getElementById('iComp').onclick = function(){
  C.drill('operator / discipline: music', 'Competency profile',
    S.competency.map(function(s){
      return '<div class="strip ok"><div class="sbody"><div class="sname">' + esc(s.skill) + '</div><div class="prog"><i style="width:' + s.score + '%"></i></div></div><span class="stag ok">' + s.score + '</span></div>';
    }).join('') + '<div class="qmeta" style="margin-top:10px;color:var(--faint)">Evidence events from the music app roll up here - drills, new keys, tutor level-ups. SME coaches assess what they teach.</div>');
};
document.getElementById('iAtt').onclick = function(){
  C.drill('portfolio / attention', 'Your turn - full stream', C.queueCards());
};
C.overlay();
})();
</script>
</body>
</html>
