<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0f12">
<title>Music</title>
<link rel="icon" href="https://problemsolutions.github.io/logo-badge.svg" type="image/svg+xml">
<!-- Installable / offline (PWA): manifest + service worker (registered at end of body). -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music">
<!-- Shared songbook styles (theme + all components). -->
<link rel="stylesheet" href="../shared/songbook.css">
<link rel="stylesheet" href="../shared/tracks.css">
<style>
  /* in-app instrument/tuning picker (appbar) */
  .picker{background:var(--surface-2);color:var(--txt);border:1px solid var(--line-strong);border-radius:10px;
    font-family:inherit;font-size:.8rem;font-weight:600;padding:8px 10px;max-width:46vw;cursor:pointer;}
  .picker:focus{outline:none;border-color:var(--accent);}
  /* accent-colour chooser lives in the Tune tab now (not the always-on header) */
  .tuneTheme{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:24px;}
  .themeWrap{position:relative;}
  #themeBtn{font-size:1.3rem;line-height:1;}
  .themePop{position:absolute;bottom:calc(100% + 8px);right:0;z-index:30;display:flex;gap:9px;flex-wrap:wrap;
    width:202px;padding:12px;background:var(--surface-2);border:1px solid var(--line-strong);border-radius:13px;
    box-shadow:0 14px 34px rgba(0,0,0,.5);animation:fadeUp .18s ease;}
  .themePop[hidden]{display:none;}
  .sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;padding:0;
    background:var(--sc);transition:transform .08s;}
  .sw:active{transform:scale(.88);}
  .sw.on{border-color:var(--txt);box-shadow:0 0 0 2px var(--surface-2),0 0 0 4px var(--sc);}
</style>
</head>
<body>
<div class="app">
  <div class="appbar">
    <div class="brand"><span class="nm">Music</span><span class="ctx" id="ctxLine">loading…</span></div>
    <select class="picker" id="profilePicker" title="Instrument / tuning" aria-label="Instrument and tuning"></select>
  </div>
  <div class="view" id="view">
    <section class="screen on" id="s-library">
      <div class="libHero" id="libHero"></div>
      <input class="search" id="search" placeholder="Search a song or an artist…">
      <div class="chips" id="decadeChips"></div>
      <div class="songs" id="songsList"></div>
      <div class="libCount" id="libCount"></div>
    </section>
    <section class="screen" id="s-compose">
      <div class="composeWrap">
        <div class="progHead"><span class="progLbl">Progression</span>
          <div class="progTools">
            <button class="iconBtn" id="cTdown" title="Transpose down a semitone">♭</button>
            <button class="keyReadout" id="cKey" title="Key (the first chord) — tap to reset to your original key">—</button>
            <button class="iconBtn" id="cTup" title="Transpose up a semitone">♯</button>
            <button class="iconBtn" id="cMax" title="Maximize chords">⤢</button>
          </div></div>
        <div class="prog" id="prog"></div>
        <div id="suggest" class="suggest"></div>
        <div id="progPicks" class="progPicks"></div>
        <div class="cActions">
          <button class="btn ghost" id="cClear">Clear</button>
          <button class="btn red" id="cSave">Save progression</button>
        </div>
        <div class="keyBox" id="keyBox">
          <div class="keyHead"><span class="keyLbl">Key &amp; scale</span><button class="keyClearBtn" id="keyClear" hidden>Clear key</button></div>
          <div class="keyRoots" id="keyRoots"></div>
          <div class="chips keyModes" id="keyModes"></div>
          <div class="keyView" id="keyView"></div>
        </div>
        <div class="allChordsLbl">All chords</div>
        <div class="chips" id="catChips"></div>
        <div class="chordGrid" id="buildGrid"></div>
      </div>
    </section>
    <section class="screen" id="s-practice">
      <div id="practiceEmpty" class="empty">Choose a song from Songs to open it.</div>
      <div id="practiceBody" style="display:none"></div>
    </section>
    <section class="screen" id="s-tracks"></section>
    <section class="screen" id="s-setlist">
      <div class="setHead"><div class="ti"><h2>The Setlist</h2><p id="setCount">No songs yet</p></div>
        <button class="iconBtn" id="setClear" title="Clear setlist">✕</button></div>
      <div id="setBody"></div>
      <div class="setBar" id="setBar" style="display:none"><button class="btn red" id="performBtn">Start performance</button></div>
    </section>
    <section class="screen" id="s-tune">
      <div class="tunerWrap">
        <h2>Tune Up</h2>
        <div class="sub">Play a string — the needle shows how sharp or flat you are.</div>
        <div class="tuneTuneRow" id="tuneTuneRow" style="display:none">
          <div class="sub" style="margin:14px 0 8px">Tuning</div>
          <div class="chips" id="tuneTunings"></div>
        </div>
        <div class="tCard">
          <h3>Auto-tuner <span style="font-weight:400;font-style:italic;color:var(--ink-faint);font-size:.8rem">— live needle by mic</span></h3>
          <div class="micBox" id="micBox"></div>
        </div>
        <div class="sub" style="margin-top:22px;margin-bottom:10px">Reference tones — tap a letter for a steady pitch.</div>
        <div class="tStrings" id="tStrings"></div>
        <div class="tuneTheme">
          <span class="sub">Accent colour</span>
          <div class="themeWrap">
            <button class="ab-btn" id="themeBtn" title="Accent colour" aria-label="Choose accent colour" aria-haspopup="true" aria-expanded="false">●</button>
            <div class="themePop" id="themePop" role="menu" aria-label="Accent colour" hidden></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="tabbar">
    <button class="on" data-tab="library"><span class="icn">♪</span><span class="lbl">Songs</span></button>
    <button data-tab="compose"><span class="icn">✎</span><span class="lbl">Compose</span></button>
    <button data-tab="tracks"><span class="icn">▶</span><span class="lbl">Tracks</span></button>
    <button data-tab="setlist"><span class="icn">❦</span><span class="lbl">Set</span></button>
    <button data-tab="tune"><span class="icn">◴</span><span class="lbl">Tune</span></button>
  </div>
</div>
<div class="perform" id="perform">
  <div class="pTop"><span class="pos" id="pPos">1 / 1</span>
    <div class="tools"><button class="pmini" id="pDown" title="Key down">−</button><button class="pmini" id="pUp" title="Key up">+</button><button class="pmini" id="pCtrls" title="Stage controls">⚙</button><button class="pmini" id="pDimBtn" title="Stage dim">◐</button><button class="x" id="pClose">✕</button></div></div>
  <div class="pTitle" id="pTitle"></div>
  <div class="pArtist" id="pArtist"></div>
  <div class="pKey" id="pKeyLine"></div>
  <div class="pSheet" id="pSheet"></div>
  <div class="pSpeed" id="pSpeed">
    <div class="psRow"><label>Scroll</label><input type="range" id="pSpeedR" min="10" max="80" value="28"><span class="sv" id="pSpeedV">28</span></div>
    <div class="psRow"><label>Size</label><div class="psBtns"><button class="psBtn" id="pFontDown">A−</button><button class="psBtn" id="pFontAuto">Auto</button><button class="psBtn" id="pFontUp">A+</button></div></div>
    <div class="psRow"><label>View</label><div class="psBtns"><button class="psBtn" id="pViewLyrics">Lyrics</button><button class="psBtn" id="pViewChords">Chords</button></div></div>
  </div>
  <div class="pNav"><button class="btn ghost" id="pPrev">←</button><button class="btn scrollBtn" id="pScroll">▶</button><button class="btn" id="pNext">→</button></div>
</div>
<div class="maxOv" id="maxOv"><button class="maxClose" id="maxClose">✕</button><div class="maxGrid" id="maxGrid"></div></div>

<!-- Shared, instrument-agnostic runtime -->
<script src="../shared/queue.js"></script>
<script src="../shared/tempo.js"></script>
<script src="../shared/circle.js"></script>
<script src="../shared/songbook.js"></script>
<script src="../shared/tuner.js"></script>
<script src="../shared/diagram.js"></script>
<script src="../shared/audio.js"></script>
<script src="../shared/tracks.js"></script>
<!-- Versatile bootstrap: load profiles, build a chord-pack adapter from the active
     profile (pure data) + the shared Diagram/ChordAudio/Tuner, then mount. -->
<script>
(function () {
  'use strict';
  function el(id) { return document.getElementById(id); }

  // chord-progression suggestion map (instrument-agnostic chord names).
  var SUGG = {
    C: ["G", "Am", "F", "Em", "Dm"], G: ["C", "D", "Em", "Am", "D7"], D: ["G", "A", "Bm", "Em", "A7"],
    A: ["D", "E", "Bm", "E7", "F"], E: ["A", "B", "C#m", "B7", "A"], F: ["C", "G", "Dm", "Bb", "Am"],
    B: ["E", "A", "F#7", "E7", "G"], Am: ["F", "G", "C", "Dm", "E7"], Em: ["C", "G", "D", "Am", "B7"],
    Dm: ["G", "C", "F", "Am", "A7"], Bm: ["G", "A", "D", "Em", "F#7"], Gm: ["F", "D7", "Cm", "Eb", "Bb"],
    Cm: ["G7", "Fm", "Ab", "Eb", "Bb"], Fm: ["C7", "Bbm", "Db", "Ab", "Eb"],
    G7: ["C", "Am", "F", "Em"], C7: ["F", "Dm", "G", "Am"], D7: ["G", "Em", "C", "Bm"],
    A7: ["D", "Bm", "G", "F#m"], E7: ["A", "C#m", "F#m", "B7"], F7: ["Bb", "Dm", "C", "Gm"],
    B7: ["E", "G#m", "C#m", "F#m"]
  };
  var CONTEXTS_BASE = { library: 'your repertoire', compose: 'build a progression', tracks: 'find a track in your key', practice: 'now playing', setlist: 'tonight’s running order' };

  function rootFreq(name) {
    if (window.Songbook && typeof window.Songbook.chordRootFreq === 'function') return window.Songbook.chordRootFreq(name);
    return 261.63;
  }

  // ---- movable-shape fallback (instrument-agnostic) --------------------------
  // Profiles list explicit fingerings only for common chords. Transpose/compose
  // can land on any of the 12 roots, so for a chord the profile doesn't list we
  // slide a CLOSED template (no open strings, so it moves) of the same quality up
  // to the requested root - keeping the lowest valid window. Result: every key
  // both draws a real shape and strums on every instrument.
  var CHORD_PC = { C: 0, 'C#': 1, Db: 1, D: 2, 'D#': 3, Eb: 3, E: 4, F: 5, 'F#': 6, Gb: 6, G: 7, 'G#': 8, Ab: 8, A: 9, 'A#': 10, Bb: 10, B: 11 };
  function freqPc(f) { return ((Math.round(69 + 12 * Math.log2(f / 440)) % 12) + 12) % 12; }
  // Parse the root pitch class generically (handles E#, B#, Cb, Fb, double accidentals
  // that the CHORD_PC table can't) via the shared helper; table is the no-Songbook fallback.
  function chordRootPc(name) {
    if (window.Songbook && typeof window.Songbook.noteToPc === 'function') {
      var m0 = /^([A-G][#bx]*)/.exec(name); if (m0) { var pc = window.Songbook.noteToPc(m0[1]); if (pc != null) return pc; }
    }
    var m = /^([A-G][#b]?)/.exec(name); return m ? (CHORD_PC[m[1]] != null ? CHORD_PC[m[1]] : null) : null;
  }
  function chordQual(name) { var m = /^[A-G][#b]?(.*)$/.exec(name); return m ? m[1] : ''; }
  function buildTemplates(chords) {
    var t = {}; if (!chords) return t;
    Object.keys(chords).forEach(function (nm) {
      var fr = chords[nm]; if (fr.indexOf(0) >= 0) return;        // open string -> can't slide
      var q = chordQual(nm), rp = chordRootPc(nm); if (rp == null) return;
      (t[q] = t[q] || []).push({ frets: fr, rootPc: rp });
    });
    return t;
  }
  // If a profile lists no CLOSED shape for a quality (e.g. Open-G has no movable
  // maj7/m7 barre), slide a closely-related quality to the same root rather than
  // drawing a blank name-only slot - a real, strummable shape beats nothing.
  var QUAL_FALLBACK = { 'maj7': ['', '7'], 'm7': ['m'], '7': [''], '6': [''], 'sus4': [''], 'sus2': [''] };
  function movableVoicing(templates, name) {
    var q = chordQual(name), rp = chordRootPc(name); if (rp == null) return null;
    var tries = [q].concat(QUAL_FALLBACK[q] || []);
    for (var i = 0; i < tries.length; i++) {
      var tpls = templates[tries[i]]; if (!tpls || !tpls.length) continue;
      var best = null;
      tpls.forEach(function (tp) {
        var base = ((rp - tp.rootPc) % 12 + 12) % 12;             // slide up to the root,
        [base, base - 12].forEach(function (d) {                  // or down an octave - lowest wins
          var ok = true, f = tp.frets.map(function (x) { if (x < 0) return -1; var v = x + d; if (v < 1) ok = false; return v; });
          if (!ok) return; var max = Math.max.apply(null, f); if (max > 14) return;
          if (!best || max < best.max) best = { f: f, max: max };
        });
      });
      if (best) return best.f;
    }
    return null;
  }

  // Build the chord-pack interface the songbook engine expects, from a pure-data
  // profile + the shared Diagram / ChordAudio / Tuner modules.
  function buildAdapter(profile) {
    var openFreqs = profile.strings.map(function (s) { return s.f; });
    var templates = buildTemplates(profile.chords);
    // explicit profile voicing first; else a movable shape; else null (name-only)
    function voicingFor(name) {
      return (profile.chords && profile.chords[name]) || movableVoicing(templates, name) || null;
    }
    // HSR Chain wants the CLOSED (movable) shape so I/IV/V show the same hand
    // shape slid up the neck. If the profile only has an open shape (no closed
    // template), fall back so the chord still renders.
    function closedVoicingFor(name) {
      return movableVoicing(templates, name) || (profile.chords && profile.chords[name]) || null;
    }
    // HSR Chain shape-consistency: when all chord names in a chain share the
    // same quality (typical I-IV-V in Major; i-iv-v in Minor), pick a SINGLE
    // template family that voices all three within the fret window so the eye
    // sees the same hand shape slid up. Without this, movableVoicing picks the
    // lowest-fret shape PER chord and can mix E-shape G with A-shape C/D -
    // killing the HSR teaching. Falls back to per-chord closed voicings when
    // the chain mixes qualities (Mixolydian's V is minor, etc.).
    function chainVoicings(names) {
      if (!names || !names.length) return [];
      var qs = names.map(chordQual);
      var sameQual = qs.every(function (q) { return q === qs[0]; });
      if (sameQual) {
        var tpls = templates[qs[0]];
        if (tpls && tpls.length) {
          var best = null;
          tpls.forEach(function (tp) {
            var voicings = names.map(function (name) {
              var rp = chordRootPc(name); if (rp == null) return null;
              var base = ((rp - tp.rootPc) % 12 + 12) % 12;
              var chosen = null;
              [base, base - 12].forEach(function (d) {
                var ok = true, f = tp.frets.map(function (x) { if (x < 0) return -1; var v = x + d; if (v < 1) ok = false; return v; });
                if (!ok) return; var max = Math.max.apply(null, f); if (max > 14) return;
                if (!chosen || max < chosen.max) chosen = { f: f, max: max };
              });
              return chosen;
            });
            if (voicings.every(function (v) { return v !== null; })) {
              var total = voicings.reduce(function (s, v) { return s + v.max; }, 0);
              if (!best || total < best.total) best = { total: total, voicings: voicings.map(function (v) { return v.f; }) };
            }
          });
          if (best) return best.voicings;
        }
      }
      // Mixed-quality chain or no single-family fit: per-chord closed voicing.
      return names.map(closedVoicingFor);
    }
    return {
      meta: { instrument: profile.instrument, tuning: profile.tuning, strings: profile.strings.length, stringNames: profile.strings.map(function (s) { return s.n; }) },
      hasChord: function (name) { return !!voicingFor(name); },
      diagram: function (name, size) { return window.Diagram.render(voicingFor(name), { size: size, name: name }); },
      diagramClosed: function (name, size) { return window.Diagram.render(closedVoicingFor(name), { size: size, name: name }); },
      diagramChain: function (names, size) {
        var voicings = chainVoicings(names);
        return voicings.map(function (frets, i) { return window.Diagram.render(frets, { size: size, name: names[i] }); });
      },
      // scale map for the active instrument: open-string pitch classes + the scale's
      // pitch classes -> a low-position neck diagram (root tones in the accent colour).
      scaleDiagram: function (rootPc, scalePcs, frets) {
        var openPcs = profile.strings.map(function (s) { return freqPc(s.f); });
        return window.Diagram.scale({ openPcs: openPcs, scalePcs: scalePcs, rootPc: rootPc, frets: frets || 7 });
      },
      playChord: function (name) { var fr = voicingFor(name); if (fr) window.ChordAudio.strum(fr, openFreqs); else window.ChordAudio.tone(rootFreq(name)); },
      playNote: function (name) { window.ChordAudio.tone(rootFreq(name), 1.1); },
      playFreq: function (freq, dur) { window.ChordAudio.tone(freq, dur || 1.1); },
      onLeaveTuner: function () { if (window.Tuner) window.Tuner.stop(); },
      init: function (engine) {
        if (window.Tuner) window.Tuner.mount({ strings: profile.strings });
        var q = el('quickTune'); if (q) q.onclick = function () { engine.switchTab('tune'); };
      }
    };
  }

  function loadScript(src) {
    return new Promise(function (res, rej) {
      var s = document.createElement('script'); s.src = src;
      s.onload = res; s.onerror = function () { rej(new Error('failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }

  function activeId(profiles) {
    var qp = new URLSearchParams(location.search).get('p');
    var hp = (location.hash || '').replace(/^#/, '');
    var want = qp || hp;
    if (want && profiles[want]) return want;
    return Object.keys(profiles)[0];
  }

  function buildPicker(profiles, activeKey) {
    var sel = el('profilePicker'); if (!sel) return;
    var byInst = {};
    Object.keys(profiles).forEach(function (k) { var p = profiles[k]; (byInst[p.instrument] = byInst[p.instrument] || []).push(p); });
    sel.innerHTML = '';
    Object.keys(byInst).forEach(function (inst) {
      var og = document.createElement('optgroup'); og.label = inst.charAt(0).toUpperCase() + inst.slice(1);
      byInst[inst].forEach(function (p) {
        var o = document.createElement('option'); o.value = p.id; o.textContent = p.label;
        if (p.id === activeKey) o.selected = true; og.appendChild(o);
      });
      sel.appendChild(og);
    });
    sel.onchange = function () { location.search = '?p=' + encodeURIComponent(sel.value); };
  }

  // Tune tab: one-tap tuning presets for the active instrument (e.g. guitar
  // Standard / Drop D / Open G). Switching a preset switches the whole profile,
  // so the chord shapes retune to match the tuning - not just the needle.
  function renderTuningChips(profiles, activeKey) {
    var row = el('tuneTuneRow'), box = el('tuneTunings'); if (!row || !box) return;
    var inst = profiles[activeKey].instrument;
    var sibs = Object.keys(profiles).map(function (k) { return profiles[k]; })
      .filter(function (p) { return p.instrument === inst; });
    if (sibs.length < 2) { row.style.display = 'none'; return; }
    row.style.display = 'block';
    box.innerHTML = '';
    sibs.forEach(function (p) {
      var b = document.createElement('button');
      b.className = 'chip' + (p.id === activeKey ? ' on' : '');
      var name = p.label.split(' - ').pop();
      b.innerHTML = name + ' <span style="opacity:.55;font-weight:400">' + p.tuning + '</span>';
      b.onclick = function () { if (p.id !== activeKey) location.search = '?p=' + encodeURIComponent(p.id); };
      box.appendChild(b);
    });
  }

  function start(profile, songs) {
    el('ctxLine').textContent = profile.label;
    document.title = profile.label + ' \u2014 Music';
    var contexts = Object.assign({}, CONTEXTS_BASE, { tune: profile.tuning + ' · tune by ear or mic' });
    var pack = buildAdapter(profile);
    // Backing Tracks tab: same instrument pack -> the Studio can draw the fretboard
    // scale + chord shapes for a track's key. Mounted here (not earlier) so the pack exists.
    var tracksEl = el('s-tracks');
    if (tracksEl && window.Tracks) window.Tracks.mount({ container: tracksEl, tracksUrl: '../backing-tracks/tracks.json', pack: pack });
    window.Songbook.mount({
      songs: songs,
      chordPack: pack,
      storagePrefix: 'roadcase-' + profile.id,
      suggestions: SUGG,
      contexts: contexts,
      el: {
        songsList: el('songsList'), decadeChips: el('decadeChips'), search: el('search'), libCount: el('libCount'), libHero: el('libHero'),
        practiceEmpty: el('practiceEmpty'), practiceBody: el('practiceBody'),
        setBody: el('setBody'), setBar: el('setBar'), setCount: el('setCount'), setClear: el('setClear'), performBtn: el('performBtn'),
        perform: el('perform'), pSheet: el('pSheet'), pPos: el('pPos'), pTitle: el('pTitle'), pArtist: el('pArtist'), pKeyLine: el('pKeyLine'),
        pPrev: el('pPrev'), pNext: el('pNext'), pClose: el('pClose'), pUp: el('pUp'), pDown: el('pDown'), pDimBtn: el('pDimBtn'),
        pScroll: el('pScroll'), pSpeed: el('pSpeed'), pSpeedR: el('pSpeedR'), pSpeedV: el('pSpeedV'),
        pCtrls: el('pCtrls'), pFontDown: el('pFontDown'), pFontAuto: el('pFontAuto'), pFontUp: el('pFontUp'),
        pViewLyrics: el('pViewLyrics'), pViewChords: el('pViewChords'),
        prog: el('prog'), suggest: el('suggest'), progPicks: el('progPicks'), catChips: el('catChips'), buildGrid: el('buildGrid'),
        cClear: el('cClear'), cSave: el('cSave'), cMax: el('cMax'),
        cTup: el('cTup'), cTdown: el('cTdown'), cKey: el('cKey'),
        keyRoots: el('keyRoots'), keyModes: el('keyModes'), keyView: el('keyView'), keyClear: el('keyClear'),
        maxOv: el('maxOv'), maxGrid: el('maxGrid'), maxClose: el('maxClose'),
        ctxLine: el('ctxLine')
      }
    });
  }

  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function fail(msg) { var list = el('songsList'); if (list) list.innerHTML = '<div class="empty">' + esc(msg) + '</div>'; }

  // Boot: manifest -> profile scripts -> active profile -> songs -> mount.
  fetch('../shared/profiles/manifest.json')
    .then(function (r) { if (!r.ok) throw new Error('manifest ' + r.status); return r.json(); })
    .then(function (m) {
      // allSettled: one missing/broken profile drops out; the rest still load.
      return Promise.allSettled((m.profiles || []).map(function (id) { return loadScript('../shared/profiles/' + id + '.js'); }));
    })
    .then(function () {
      var profiles = window.MusicProfiles || {};
      if (!Object.keys(profiles).length) { fail('No tuning profiles found.'); return; }
      var key = activeId(profiles);
      buildPicker(profiles, key);
      renderTuningChips(profiles, key);
      var profile = profiles[key];
      return fetch('../shared/songs.json')
        .then(function (r) { if (!r.ok) throw new Error('songs.json ' + r.status); return r.json(); })
        .then(function (songs) { start(profile, songs); });
    })
    .catch(function (err) { fail('Could not load (' + err.message + '). This page must be served over http(s) - open it via GitHub Pages or a local server.'); });
})();
</script>
<!-- Accent-colour chooser. Re-skins the --accent family live (the tuner's
     red/amber/green status colours are left alone) and remembers the choice
     across instruments. Spectrum runs teal -> ... -> a warm amber/yellow. -->
<script>
(function () {
  'use strict';
  // a = accent, d = dim (borders), p = deep (tinted backgrounds)
  var PALETTE = [
    { n: 'Teal',   a: '#5eead4', d: '#244b45', p: '#16302c' },
    { n: 'Green',  a: '#6ee7a8', d: '#235a3e', p: '#143226' },
    { n: 'Sky',    a: '#56cdf4', d: '#1f4a5c', p: '#122d39' },
    { n: 'Violet', a: '#a78bfa', d: '#3a2f63', p: '#221b3d' },
    { n: 'Pink',   a: '#f472b6', d: '#5c2a45', p: '#371829' },
    { n: 'Coral',  a: '#fb923c', d: '#5c3115', p: '#38200d' },
    { n: 'Amber',  a: '#fbbf24', d: '#5c4715', p: '#38290b' }
  ];
  var KEY = 'music.accent.v1';
  function apply(t) {
    var r = document.documentElement.style;
    r.setProperty('--accent', t.a);
    r.setProperty('--accent-dim', t.d);
    r.setProperty('--accent-deep', t.p);
  }
  function current() {
    try { var v = localStorage.getItem(KEY); if (v) { for (var i = 0; i < PALETTE.length; i++) if (PALETTE[i].a === v) return PALETTE[i]; } } catch (e) {}
    return PALETTE[0];
  }
  // apply persisted accent immediately (documentElement exists already) to avoid a flash
  apply(current());

  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('themeBtn'), pop = document.getElementById('themePop');
    if (!btn || !pop) return;
    function mark(active) {
      pop.querySelectorAll('.sw').forEach(function (s) { s.classList.toggle('on', s.dataset.a === active.a); });
    }
    PALETTE.forEach(function (t) {
      var s = document.createElement('button');
      s.className = 'sw'; s.type = 'button'; s.dataset.a = t.a;
      s.style.setProperty('--sc', t.a);
      s.title = t.n; s.setAttribute('role', 'menuitemradio'); s.setAttribute('aria-label', t.n);
      s.onclick = function () { apply(t); try { localStorage.setItem(KEY, t.a); } catch (e) {} mark(t); close(); };
      pop.appendChild(s);
    });
    mark(current());
    function open() { pop.hidden = false; btn.setAttribute('aria-expanded', 'true'); }
    function close() { pop.hidden = true; btn.setAttribute('aria-expanded', 'false'); }
    btn.onclick = function (e) { e.stopPropagation(); pop.hidden ? open() : close(); };
    pop.addEventListener('click', function (e) { e.stopPropagation(); });
    document.addEventListener('click', function () { if (!pop.hidden) close(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !pop.hidden) close(); });
  });
})();
</script>
<!-- Register the service worker (offline + installable). Scoped to /music/ so it
     covers ../shared/ too; failures are non-fatal (the app still works online). -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('../sw.js', { scope: '../' }).catch(function () { });
  });
}
</script>
