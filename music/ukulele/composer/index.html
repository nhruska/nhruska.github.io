<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Uke Composer</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap");

  :root{
    --bg:#0d0f12;
    --bg-2:#14171c;
    --surface:#181b21;
    --surface-2:#1f232b;
    --line:#262b34;
    --txt:#e8ebf0;
    --txt-soft:#8a92a0;
    --txt-dim:#5b626e;
    --accent:#5eead4;
    --accent-dim:#2a4f49;
    --warn:#fbbf24;
    --bad:#f87171;
    --good:#5eead4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Inter",sans-serif;color:var(--txt);background:var(--bg);
    min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  }
  .wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:18px 16px 120px;}

  .sunwave{display:none;}

  /* tabs */
  .tabs{display:flex;gap:4px;margin:12px 0 12px;background:var(--surface);
    padding:4px;border-radius:12px;border:1px solid var(--line);}
  .tab{flex:1;border:none;background:transparent;font-family:inherit;font-weight:600;
    font-size:.82rem;color:var(--txt-soft);padding:10px 4px;border-radius:9px;cursor:pointer;
    transition:background .18s,color .18s,transform .08s;}
  .tab:active{transform:scale(.96);}
  .tab.active{background:var(--surface-2);color:var(--txt);box-shadow:0 0 0 1px var(--line);}
  .tabTuner{flex:0 0 auto;padding:10px 14px;color:var(--accent);
    box-shadow:inset 0 0 0 1px var(--accent-dim);}
  .tabTuner:active{transform:scale(.93);}

  /* always-visible tuner strip */
  .tuneStrip{display:flex;align-items:stretch;gap:8px;margin:0 0 12px;padding:6px;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;}
  .tuneStripLbl{font-size:.6rem;font-weight:700;color:var(--txt-dim);text-transform:uppercase;
    letter-spacing:.12em;flex:0 0 auto;align-self:center;padding:0 4px 0 8px;}
  .tuneStripBtns{display:flex;gap:6px;flex:1;}
  .tuneStripBtns button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    background:var(--bg-2);border:1px solid var(--line);border-radius:9px;
    padding:7px 0 6px;cursor:pointer;transition:transform .08s,background .15s,border-color .15s,box-shadow .2s;}
  .tuneStripBtns button .n{font-family:"Space Mono",monospace;font-weight:700;font-size:1.05rem;color:var(--accent);line-height:1;}
  .tuneStripBtns button .hz{font-family:"Space Mono",monospace;font-size:.56rem;color:var(--txt-dim);line-height:1;}
  .tuneStripBtns button:active{transform:scale(.92);}
  .tuneStripBtns button.ring{background:var(--accent-dim);border-color:var(--accent);
    box-shadow:0 0 14px rgba(94,234,212,.35);}

  .panel{display:none;}
  .panel.active{display:block;animation:fade .28s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

  .card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:14px;
    border:1px solid var(--line);}
  .card h2{font-size:.72rem;font-weight:600;color:var(--txt-soft);margin-bottom:12px;
    text-transform:uppercase;letter-spacing:.08em;}

  /* chord diagram */
  .chord{display:inline-flex;flex-direction:column;align-items:center;gap:5px;}
  .chord-name{font-weight:600;font-size:.85rem;color:var(--txt);}
  svg.fret{display:block;}
  .chord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:10px;}
  .chord.pick{cursor:pointer;border-radius:12px;padding:9px 4px 7px;transition:background .15s,transform .08s,box-shadow .15s;border:1px solid transparent;}
  .chord.pick:active{transform:scale(.9);background:var(--surface-2);}
  .chord.pick.sel{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 1px var(--accent);}

  /* category chips */
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .chip{border:1px solid var(--line);background:transparent;color:var(--txt-soft);font-family:inherit;
    font-weight:600;font-size:.74rem;padding:7px 13px;border-radius:8px;cursor:pointer;
    transition:background .15s,color .15s,border-color .15s,transform .08s;}
  .chip:active{transform:scale(.94);}
  .chip.active{background:var(--accent);color:#06201c;border-color:var(--accent);}

  /* progression builder */
  .prog{display:flex;flex-wrap:wrap;gap:8px;min-height:96px;padding:12px;border-radius:12px;
    background:var(--bg-2);border:1px dashed var(--line);align-items:center;}
  .prog:empty::after{content:"Tap chords below to build your progression";color:var(--txt-dim);
    font-size:.82rem;width:100%;text-align:center;}
  .slot{position:relative;animation:pop .2s ease;}
  @keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  .slot .rm{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;
    border:1px solid var(--line);background:var(--surface-2);color:var(--txt-soft);font-size:.72rem;cursor:pointer;line-height:1;
    transition:background .15s,color .15s,transform .08s;}
  .slot .rm:active{transform:scale(.85);background:var(--bad);color:#fff;}

  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{flex:1;min-width:110px;border:1px solid var(--line);font-family:inherit;font-weight:600;font-size:.84rem;
    padding:12px;border-radius:11px;cursor:pointer;transition:background .15s,transform .08s,opacity .15s,border-color .15s,color .15s;
    color:var(--txt);background:var(--surface-2);}
  .btn:active{transform:scale(.97);}
  .btn.play{background:var(--accent);color:#06201c;border-color:var(--accent);}
  .btn.stop{background:var(--surface-2);color:var(--txt);}
  .btn.clear{background:transparent;color:var(--bad);border-color:var(--line);}
  .btn.ghost{background:transparent;color:var(--accent);border-color:var(--accent-dim);}
  .btn:disabled{opacity:.35;cursor:default;}
  .btn:disabled:active{transform:none;}

  /* suggestions */
  .suggrid{display:flex;flex-direction:column;gap:9px;}
  .sugg{background:var(--bg-2);border-radius:11px;padding:12px 13px;border:1px solid var(--line);
    cursor:pointer;transition:border-color .15s,background .15s,transform .08s;}
  .sugg:active{transform:scale(.99);border-color:var(--accent-dim);background:var(--surface-2);}
  .sugg .t{font-weight:600;font-size:.9rem;}
  .sugg .c{font-size:.78rem;color:var(--txt-soft);margin-top:3px;}
  .sugg .seq{font-family:"Space Mono",monospace;font-size:.8rem;color:var(--accent);font-weight:700;margin-top:7px;letter-spacing:.02em;}
  .miniChords{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .miniChords .chord.mini{gap:3px;}
  .miniChords .chord.mini .chord-name{font-size:.7rem;}
  .miniChords .chord.mini svg.fret{width:44px;height:auto;}

  .field{width:100%;font-family:inherit;font-size:.9rem;padding:12px 13px;border-radius:10px;
    border:1px solid var(--line);background:var(--bg-2);color:var(--txt);margin-bottom:10px;}
  .field::placeholder{color:var(--txt-dim);}
  .field:focus{outline:none;border-color:var(--accent);}
  .hint{font-size:.76rem;color:var(--txt-soft);margin-bottom:12px;line-height:1.5;}
  .loading{text-align:center;color:var(--accent);font-weight:600;font-size:.85rem;padding:14px;}
  .err{background:var(--bg-2);color:var(--bad);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:.8rem;font-weight:600;}

  .seg{display:flex;gap:4px;margin-bottom:12px;background:var(--bg-2);padding:4px;border-radius:10px;border:1px solid var(--line);}
  .seg button{flex:1;border:none;background:transparent;font-family:inherit;font-weight:600;
    font-size:.78rem;color:var(--txt-soft);padding:9px;border-radius:7px;cursor:pointer;transition:background .15s,color .15s,transform .08s;}
  .seg button:active{transform:scale(.96);}
  .seg button.on{background:var(--surface-2);color:var(--txt);}

  footer{text-align:center;font-size:.72rem;color:var(--txt-dim);margin-top:8px;}



  /* modal */
  .overlay{position:fixed;inset:0;z-index:40;background:rgba(6,8,10,.78);backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;padding:18px;}
  .overlay.show{display:flex;animation:fade .22s ease;}
  .modal{width:100%;max-width:420px;background:var(--surface);border-radius:20px;padding:20px 18px 22px;
    border:1px solid var(--line);position:relative;box-shadow:0 24px 60px rgba(0,0,0,.6);}
  .modal h2{font-size:1.05rem;font-weight:700;text-align:center;letter-spacing:-.01em;}
  .modal .sub{text-align:center;font-size:.76rem;color:var(--txt-soft);margin-top:3px;margin-bottom:6px;}
  .closeX{position:absolute;top:14px;right:16px;border:none;background:transparent;font-size:1.4rem;
    color:var(--txt-dim);cursor:pointer;line-height:1;transition:color .15s,transform .08s;}
  .closeX:active{transform:scale(.85);color:var(--txt);}

  .noteBig{font-family:"Space Mono",monospace;text-align:center;font-weight:700;font-size:3.6rem;line-height:1;
    color:var(--txt);margin:10px 0 0;transition:color .15s,text-shadow .15s;min-height:60px;}
  .noteBig.inTune{color:var(--good);text-shadow:0 0 24px rgba(94,234,212,.4);}
  .centsLbl{font-family:"Space Mono",monospace;text-align:center;font-size:.8rem;font-weight:400;color:var(--txt-soft);min-height:20px;}

  .meter{position:relative;height:70px;margin:14px 4px 4px;}
  .meter .scale{position:absolute;top:30px;left:0;right:0;height:3px;border-radius:2px;
    background:linear-gradient(90deg,var(--bad) 0%,var(--warn) 32%,var(--good) 50%,var(--warn) 68%,var(--bad) 100%);opacity:.55;}
  .meter .ticks{position:absolute;top:22px;left:0;right:0;height:20px;}
  .meter .ticks span{position:absolute;top:0;width:1px;height:8px;background:var(--line);}
  .meter .center{position:absolute;top:18px;left:50%;width:1px;height:26px;background:var(--accent);transform:translateX(-50%);}
  .meter .needle{position:absolute;top:8px;left:50%;width:3px;height:42px;border-radius:2px;
    background:var(--bad);transform:translateX(-50%);transition:left .09s linear,background .15s;
    box-shadow:0 0 10px rgba(0,0,0,.4);}
  .meter .flatlbl,.meter .sharplbl{position:absolute;top:50px;font-size:.68rem;font-weight:600;color:var(--txt-dim);}
  .meter .flatlbl{left:0;} .meter .sharplbl{right:0;}

  .strings{display:flex;gap:7px;margin:18px 0 6px;}
  .strings button{flex:1;border:1px solid var(--line);font-family:"Space Mono",monospace;font-weight:700;font-size:1rem;
    padding:13px 0;border-radius:11px;cursor:pointer;background:var(--bg-2);color:var(--txt-soft);
    transition:background .15s,color .15s,transform .08s,box-shadow .15s,border-color .15s;position:relative;}
  .strings button:active{transform:scale(.94);}
  .strings button.target{background:var(--surface-2);color:var(--txt);border-color:var(--accent-dim);}
  .strings button.lit{background:var(--accent);color:#06201c;border-color:var(--accent);box-shadow:0 0 16px rgba(94,234,212,.4);}
  .strings button small{display:block;font-family:"Inter";font-size:.58rem;font-weight:500;opacity:.7;margin-top:3px;}

  .tunerCtrl{display:flex;gap:8px;margin-top:10px;}
  .freqReadout{font-family:"Space Mono",monospace;text-align:center;font-size:.72rem;color:var(--txt-dim);min-height:16px;margin-top:6px;}
  .micErr{background:var(--bg-2);color:var(--warn);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:.78rem;
    font-weight:500;text-align:center;margin-top:10px;line-height:1.45;}

  /* big mic-free tuning buttons */
  .bigStrings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 4px;}
  .bigStr{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:18px 8px;border:1px solid var(--line);background:var(--bg-2);border-radius:16px;cursor:pointer;
    transition:transform .08s,background .15s,border-color .15s,box-shadow .2s;}
  .bigStr:active{transform:scale(.95);}
  .bigStr .bn{font-family:"Space Mono",monospace;font-weight:700;font-size:2.4rem;color:var(--accent);line-height:1;}
  .bigStr .bl{font-size:.72rem;color:var(--txt-soft);font-weight:600;}
  .bigStr .bf{font-family:"Space Mono",monospace;font-size:.66rem;color:var(--txt-dim);}
  .bigStr.ring{background:var(--accent-dim);border-color:var(--accent);box-shadow:0 0 22px rgba(94,234,212,.35);}
  @media (orientation:landscape){ .bigStrings{grid-template-columns:repeat(4,1fr);} }

  /* mic disclosure */
  .micWrap{margin-top:14px;border-top:1px solid var(--line);padding-top:6px;}
  .micWrap summary{list-style:none;cursor:pointer;color:var(--txt-soft);font-size:.8rem;font-weight:600;
    padding:10px 2px;text-align:center;transition:color .15s;}
  .micWrap summary::-webkit-details-marker{display:none;}
  .micWrap summary::after{content:" ▾";color:var(--txt-dim);}
  .micWrap[open] summary::after{content:" ▴";}
  .micWrap summary:active{color:var(--accent);}
  .micInner{padding-top:4px;}

  /* density */
  .wrap{padding:12px 14px 96px;}
  .tabs{margin:12px 0 10px;}
  .card.compact{padding:12px;margin-bottom:10px;}
  .prog{min-height:84px;padding:10px;}
  .chord-grid{gap:8px;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));}

  /* progression header w/ maximize */
  .progHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .progLbl{font-size:.72rem;font-weight:600;color:var(--txt-soft);text-transform:uppercase;letter-spacing:.08em;}
  .iconBtn{border:1px solid var(--line);background:var(--bg-2);color:var(--accent);
    width:34px;height:34px;border-radius:9px;font-size:1.1rem;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:transform .08s,background .15s,border-color .15s;}
  .iconBtn:active{transform:scale(.9);background:var(--accent);color:#06201c;border-color:var(--accent);}
  .iconBtn:disabled{opacity:.3;cursor:default;}
  .iconBtn:disabled:active{transform:none;background:var(--bg-2);color:var(--accent);}

  /* maximize overlay */
  .maxOverlay{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;
    flex-direction:column;padding:env(safe-area-inset-top,12px) 14px 14px;}
  .maxOverlay.show{display:flex;animation:fade .22s ease;}
  .maxClose{position:absolute;top:14px;right:16px;z-index:2;border:1px solid var(--line);
    background:var(--surface);color:var(--txt);width:40px;height:40px;border-radius:10px;
    font-size:1.1rem;cursor:pointer;transition:transform .08s,border-color .15s;}
  .maxClose:active{transform:scale(.9);border-color:var(--accent);}
  .maxGrid{flex:1;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;
    gap:18px;overflow:auto;padding:48px 4px 8px;}
  .maxGrid .mChord{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .maxGrid .mName{font-family:"Space Mono",monospace;font-weight:700;font-size:1.8rem;color:var(--txt);}
  .maxGrid svg.fret{width:auto;}
  .maxEmpty{align-self:center;margin:auto;color:var(--txt-dim);font-size:.9rem;text-align:center;}

  /* maximized diagrams clickable */
  .maxGrid .mChord.tap{cursor:pointer;border-radius:14px;padding:8px;transition:transform .08s,background .15s;}
  .maxGrid .mChord.tap:active{transform:scale(.94);}
  .maxGrid .mChord.tap.lit{background:var(--accent-dim);}

  /* chord suggestions */
  .suggest{margin-top:12px;}
  .suggest:empty{display:none;}
  .suggLbl{font-size:.7rem;font-weight:600;color:var(--txt-soft);text-transform:uppercase;
    letter-spacing:.07em;margin-bottom:7px;}
  .suggRow{display:flex;flex-wrap:wrap;gap:7px;}
  .suggBtn{font-family:"Space Mono",monospace;font-weight:700;font-size:.9rem;
    background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-dim);
    padding:9px 14px;border-radius:10px;cursor:pointer;transition:transform .08s,background .15s,color .15s;}
  .suggBtn:active{transform:scale(.9);background:var(--accent);color:#06201c;}

  /* landscape: pack more chords per row, slightly smaller */
  @media (orientation:landscape){
    .maxGrid{gap:14px;padding:44px 8px 8px;align-content:center;}
    .maxGrid .mName{font-size:1.4rem;}
    .maxGrid svg.fret{height:150px;}
  }

  /* song sheet (chord-over-lyrics) */
  .sheetHead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px;}
  .sheetHead .meta h3{font-size:1rem;font-weight:700;letter-spacing:-.01em;}
  .sheetHead .meta p{font-size:.76rem;color:var(--txt-soft);margin-top:2px;}
  .sheetBack{border:1px solid var(--line);background:var(--bg-2);color:var(--txt-soft);
    font-family:inherit;font-weight:600;font-size:.74rem;padding:7px 11px;border-radius:8px;cursor:pointer;
    white-space:nowrap;transition:transform .08s,border-color .15s;}
  .sheetBack:active{transform:scale(.93);border-color:var(--accent);}
  .sheetChips{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
  .sheetChips .sc{font-family:"Space Mono",monospace;font-weight:700;font-size:.76rem;
    background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-dim);
    padding:5px 9px;border-radius:7px;}
  .sheet{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:14px 12px;
    overflow-x:auto;}
  .sheet .sect{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    color:var(--txt-dim);margin:14px 0 6px;}
  .sheet .sect:first-child{margin-top:0;}
  .sheet .line{font-family:"Space Mono",monospace;font-size:.84rem;line-height:1.15;white-space:pre;
    color:var(--txt);}
  .sheet .crd{color:var(--accent);font-weight:700;display:inline-block;}
  .sheet .lyr{color:var(--txt);display:block;margin-bottom:8px;}
  .sheetActions{display:flex;gap:8px;margin-top:12px;}
  .sheetHeadBtns{display:flex;gap:8px;align-items:center;flex:none;}

  /* transpose control */
  .transpose{display:flex;align-items:center;gap:8px;margin:10px 0 4px;}
  .tBtn{width:42px;height:42px;flex:none;border:1px solid var(--line);background:var(--bg-2);
    color:var(--accent);font-family:"Space Mono",monospace;font-weight:700;font-size:1.3rem;
    border-radius:10px;cursor:pointer;transition:transform .08s,background .15s,border-color .15s;}
  .tBtn:active{transform:scale(.9);background:var(--accent);color:#06201c;border-color:var(--accent);}
  .tReadout{flex:1;text-align:center;display:flex;flex-direction:column;gap:1px;}
  .tReadout #tKey{font-family:"Space Mono",monospace;font-weight:700;font-size:.86rem;color:var(--txt);}
  .tReadout small{font-size:.66rem;color:var(--txt-dim);}
  .tReset{border:1px solid var(--line);background:transparent;color:var(--txt-soft);font-family:inherit;
    font-weight:600;font-size:.7rem;padding:0 10px;height:42px;border-radius:10px;cursor:pointer;
    transition:transform .08s,border-color .15s;}
  .tReset:active{transform:scale(.92);border-color:var(--accent);}

  .lyricsLink{display:block;text-align:center;margin-top:12px;color:var(--accent);font-weight:600;
    font-size:.84rem;text-decoration:none;padding:11px;border:1px solid var(--accent-dim);border-radius:11px;
    transition:background .15s,transform .08s;}
  .lyricsLink:active{transform:scale(.98);background:var(--accent-dim);}
  .lyricsNote{font-size:.7rem;color:var(--txt-dim);text-align:center;margin-top:8px;line-height:1.45;}
</style>
</head>
<body>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="build">Build</button>
    <button class="tab" data-tab="library">Chords</button>
    <button class="tab" data-tab="songs">Songs</button>
    <button class="tab tabTuner" id="tunerOpen">Tuner</button>
  </div>

  <div class="tuneStrip" id="tuneStrip" title="Tap a string to hear its note">
    <span class="tuneStripLbl">Tune</span>
    <div class="tuneStripBtns" id="tuneStripBtns"></div>
  </div>

  <!-- BUILD -->
  <section class="panel active" id="build">
    <div class="card compact">
      <div class="progHead">
        <span class="progLbl">Progression</span>
        <button class="iconBtn" id="maxBtn" title="Maximize" aria-label="Maximize chords">⤢</button>
      </div>
      <div class="prog" id="prog"></div>
      <div class="row" style="margin-top:8px">
        <button class="btn clear" id="clearBtn">Clear</button>
      </div>
      <div class="suggest" id="suggest"></div>
    </div>

    <div class="card compact">
      <div class="chips" id="buildChips"></div>
      <div class="chord-grid" id="buildGrid"></div>
    </div>
  </section>

  <!-- LIBRARY -->
  <section class="panel" id="library">
    <div class="card compact">
      <div class="chips" id="libChips"></div>
      <div class="chord-grid" id="libGrid"></div>
    </div>
  </section>

  <!-- SONGS -->
  <section class="panel" id="songs">
    <div class="card compact" id="songBrowse">
      <div class="seg" id="modeSeg">
        <button class="on" data-mode="vibe">Songs</button>
        <button data-mode="ai">Ask AI</button>

/* ---------- CHORD DATA (GCEA ukulele) ----------
   frets per string [G,C,E,A]; 0=open, -1=mute. Semitones from C used for audio. */
const STRINGS=[7,0,4,9]; // base MIDI-ish semitone of open G,C,E,A (rel C); we add octave below
const OPEN_FREQ={G:392.00,C:261.63,E:329.63,A:440.00}; // open string freqs
const OPEN=[OPEN_FREQ.G,OPEN_FREQ.C,OPEN_FREQ.E,OPEN_FREQ.A];

const CHORDS={
 // Major
 C:[0,0,0,3], D:[2,2,2,0], E:[4,4,4,2], F:[2,0,1,0], G:[0,2,3,2], A:[2,1,0,0], B:[4,3,2,2],
 // Minor

 // Dominant 7
 C7:[0,0,0,1], D7:[2,2,2,3], E7:[1,2,0,2], F7:[2,3,1,3], G7:[0,2,1,2], A7:[0,1,0,0], B7:[2,3,2,2],
 // Major 7
 Cmaj7:[0,0,0,2], Dmaj7:[2,2,2,4], Emaj7:[1,3,0,2], Fmaj7:[2,4,1,3], Gmaj7:[0,2,2,2], Amaj7:[1,1,0,0], Bmaj7:[3,3,2,2],
 // Minor 7

};
const CATS={
 "Major":["C","D","E","F","G","A","B"],
 "Minor":["Cm","Dm","Em","Fm","Gm","Am","Bm"],
 "7th":["C7","D7","E7","F7","G7","A7","B7"],
 "Maj7":["Cmaj7","Dmaj7","Emaj7","Fmaj7","Gmaj7","Amaj7","Bmaj7"],
 "Min7":["Cm7","Dm7","Em7","Fm7","Gm7","Am7","Bm7"]
};

/* ---------- DIAGRAM RENDER ---------- */
function diagram(name){
  const f=CHORDS[name]; if(!f) return document.createTextNode(name);
  const W=64,H=78,padX=8,padY=14, cols=3, rows=4;
  const sx=(W-2*padX)/cols, sy=(H-padY-6)/rows;
  let svg=`<svg class="fret" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // nut
  svg+=`<rect x="${padX-1}" y="${padY-3}" width="${2*padX+cols*sx-2*padX+2}" height="3" fill="#e8ebf0" rx="1"/>`;
  // vertical strings (4)
  for(let s=0;s<4;s++){const x=padX+s*sx;svg+=`<line x1="${x}" y1="${padY}" x2="${x}" y2="${padY+rows*sy}" stroke="#3a4150" stroke-width="1.4"/>`;}
  // horizontal frets
  for(let r=0;r<=rows;r++){const y=padY+r*sy;svg+=`<line x1="${padX}" y1="${y}" x2="${padX+(cols)*sx}" y2="${y}" stroke="#3a4150" stroke-width="1.4"/>`;}
  // dots
  f.forEach((fr,s)=>{
    const x=padX+s*sx;
    if(fr>0){const y=padY+(fr-0.5)*sy;svg+=`<circle cx="${x}" cy="${y}" r="6.5" fill="#5eead4" stroke="#2a4f49" stroke-width="1"/>`;}
    else if(fr===0){svg+=`<circle cx="${x}" cy="${padY-8}" r="3.5" fill="none" stroke="#5eead4" stroke-width="1.4"/>`;}
  });
  svg+=`</svg>`;
  const div=document.createElement('div');div.className='chord';
  div.innerHTML=`<span class="chord-name">${name}</span>${svg}`;
  return div;
}

/* ---------- AUDIO (pluck synth) ---------- */
let AC;
function ctx(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
// Mobile browsers suspend audio until a user gesture. Unlock on first touch/click.
(function(){
  function unlock(){
    const ac=ctx();
    if(ac.state==='suspended') ac.resume();
    // play a silent blip to fully wake the engine on iOS/Android
    try{const o=ac.createOscillator(),g=ac.createGain();g.gain.value=0;o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.01);}catch(e){}
    window.removeEventListener('touchstart',unlock);
    window.removeEventListener('click',unlock);
  }
  window.addEventListener('touchstart',unlock,{once:false});
  window.addEventListener('click',unlock,{once:false});
})();
function freqFor(stringIdx,fret){ return OPEN[stringIdx]*Math.pow(2,fret/12); }
function pluck(freq,t,dur,gainScale){
  const ac=ctx();
  const o=ac.createOscillator(), o2=ac.createOscillator(), g=ac.createGain();
  o.type='triangle'; o2.type='sine';
  o.frequency.value=freq; o2.frequency.value=freq*2.001;
  const peak=0.16*gainScale;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(peak,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);o2.connect(g);g.connect(ac.destination);
  o.start(t);o2.start(t);o.stop(t+dur);o2.stop(t+dur);
}
// sustained steady tone for tuning by ear (soft attack, hold, soft release)
function playTone(freq,t,dur){
  const ac=ctx();
  const o=ac.createOscillator(), o2=ac.createOscillator(), g=ac.createGain();
  o.type='sine'; o2.type='triangle';
  o.frequency.value=freq; o2.frequency.value=freq;
  const peak=0.22;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(peak,t+0.04);          // soft attack
  g.gain.setValueAtTime(peak,t+dur-0.25);               // hold
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);    // soft release
  o.connect(g);o2.connect(g);g.connect(ac.destination);
  o.start(t);o2.start(t);o.stop(t+dur);o2.stop(t+dur);
}
function strumChord(name,t,dir,dur){
  const f=CHORDS[name]; if(!f)return;
  const order=dir==='up'?[3,2,1,0]:[0,1,2,3];
  order.forEach((s,i)=>{
    if(f[s]<0)return;
    pluck(freqFor(s,f[s]), t+i*0.018, dur, 1-i*0.05);
  });
}
// arpeggio: each string rings out distinctly, ~140ms apart, low to high
function arpeggioChord(name,t){
  const f=CHORDS[name]; if(!f)return;
  [0,1,2,3].forEach((s,i)=>{
    if(f[s]<0)return;
    pluck(freqFor(s,f[s]), t+i*0.14, 0.9, 1);
  });
}
// strum on tap (fast ripple)
function strumTap(name){ ctx().resume(); strumChord(name, ctx().currentTime+0.02, 'down', 1.3); }
// arpeggio on tap (distinct notes)
function arpTap(name){ ctx().resume(); arpeggioChord(name, ctx().currentTime+0.02); }

/* ---------- TRANSPOSE ENGINE ---------- */
const ROOTS=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT2SHARP={"Db":"C#","Eb":"D#","Gb":"F#","Ab":"G#","Bb":"A#"};
// split a chord like "Cm7" -> {root:"C", qual:"m7"}
function splitChord(ch){
  let m=ch.match(/^([A-G][#b]?)(.*)$/);
  if(!m)return null;
  let root=m[1]; if(FLAT2SHARP[root])root=FLAT2SHARP[root];
  return {root, qual:m[2]||""};
}
function transposeChord(ch,steps){
  const p=splitChord(ch); if(!p)return ch;
  const i=ROOTS.indexOf(p.root); if(i<0)return ch;
  const ni=((i+steps)%12+12)%12;
  return ROOTS[ni]+p.qual;
}
// does a transposed set stay fully within our known shapes?
function seqPlayable(seq,steps){
  return seq.every(c=>CHORDS[transposeChord(c,steps)]);
}
// transpose a ChordPro line, only rewriting the [chord] tokens
function transposeLine(raw,steps){
  return raw.replace(/\[([^\]]+)\]/g,(_,c)=>"["+transposeChord(c,steps)+"]");
}
function curSeq(){ return currentSong?currentSong.seq.map(c=>transposeChord(c,transpose)):[]; }

function loadSeq(seq){
  progression=seq.slice(0,8); renderProg();
  document.querySelector('[data-tab=build]').click();
}

// render one chord-over-lyric line from ChordPro-ish "[C]word [G]word"
function renderSheetLine(raw){
  // build two rows: chords aligned above lyric text
  let chordRow="", lyricRow="";
  const re=/\[([^\]]+)\]/g;
  let last=0, m;
  while((m=re.exec(raw))){
    const before=raw.slice(last,m.index);
    chordRow+=" ".repeat(before.length);
    lyricRow+=before;
    const chord=m[1];
    chordRow+=chord;
    // pad lyric so next chord lands over right syllable if chord longer than gap
    last=re.lastIndex;
  }
  const tail=raw.slice(last);
  lyricRow+=tail;
  // pad chord row to align: re-do with proper interleave
  chordRow=""; lyricRow=""; last=0; re.lastIndex=0;
  while((m=re.exec(raw))){
    const before=raw.slice(last,m.index);
    lyricRow+=before; chordRow+=" ".repeat(before.length);
    const chord=m[1];
    chordRow+=chord;
    if(chord.length>0){ lyricRow+=" ".repeat(Math.max(0,chord.length)); }
    last=re.lastIndex;
  }
  lyricRow+=raw.slice(last);
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  return `<div class="line"><span class="crd">${esc(chordRow)}</span>\n${esc(lyricRow)}</div>`;
}

      </div>
    </div>
    <div class="transpose">
      <button class="tBtn" id="tDown">−</button>
      <div class="tReadout"><span id="tKey">Original key</span><small id="tSteps">0</small></div>
      <button class="tBtn" id="tUp">+</button>
      <button class="tReset" id="tReset">Reset</button>
    </div>
    <div class="sheetChips" id="sheetChips"></div>
    <div class="sheet" id="sheetBody"></div>
    <div class="sheetActions">
      <button class="btn play" id="sheetLoad">Load into builder</button>
    </div>

    <p class="lyricsNote">Sheet shows a short chorus/verse snippet for sing-along. Full lyrics open on a licensed site.</p>`;

  document.getElementById('sheetBack').onclick=closeSong;
  document.getElementById('sheetMax').onclick=()=>openMaxWith(curSeq());
  document.getElementById('tDown').onclick=()=>shiftKey(-1);
  document.getElementById('tUp').onclick=()=>shiftKey(1);
  document.getElementById('tReset').onclick=()=>{transpose=0;renderSheet();};
  document.getElementById('sheetLoad').onclick=()=>loadSeq(curSeq());
  renderSheet();
  d.scrollIntoView({behavior:'smooth',block:'start'});
}

function shiftKey(dir){
  // step until the next playable key in that direction, within ±6
  let step=transpose;
  for(let n=1;n<=6;n++){
    const cand=transpose+dir*n;
    if(Math.abs(cand)>6)break;
    if(seqPlayable(currentSong.seq,cand)){step=cand;break;}
  }
  if(step!==transpose){transpose=step;renderSheet();}
  else{ // flash that no playable key exists that way
    const r=document.getElementById('tKey'); if(r){r.textContent="no easy shape ↑↓"; setTimeout(renderSheet,700);}
  }
}

function renderSheet(){
  const s=currentSong; if(!s)return;
  // chips
  const seq=curSeq();
  document.getElementById('sheetChips').innerHTML=seq.map(c=>`<span class="sc">${c}</span>`).join('');
  // body
  let body="",lastSect=null;
  s.sheet.forEach(([sect,line])=>{
    if(sect && sect!==lastSect){body+=`<div class="sect">${sect}</div>`;lastSect=sect;}
    body+=renderSheetLine(transposeLine(line,transpose));
  });
  document.getElementById('sheetBody').innerHTML=body;
  // readout
  const key=transposeChord(s.seq[0],transpose);
  document.getElementById('tKey').textContent=transpose===0?("Original · "+s.seq[0]):("Key of "+key);
  document.getElementById('tSteps').textContent=(transpose>0?"+":"")+transpose+" semitones";
}
function closeSong(){
  currentSong=null; transpose=0;
  document.getElementById('songDetail').style.display='none';
  document.getElementById('songBrowse').style.display='block';
}

document.querySelectorAll('#modeSeg button').forEach(b=>{

document.getElementById('aiGo').onclick=askComposer;
async function askComposer(){
  const q=document.getElementById('aiInput').value.trim();
  const out=document.getElementById('aiOut');
  if(!q){out.innerHTML='<div class="err">Type a song, artist, genre, or mood first</div>';return;}
  out.innerHTML='<div class="loading">Finding progressions...</div>';
  const prompt=`You are a ukulele progression assistant. The user wants easy 2-3 chord ukulele progressions for: "${q}".
Only use chords from this exact list: ${KNOWN.join(", ")}.
Return ONLY raw JSON, no markdown, no prose. Format:
{"results":[{"t":"short evocative name","c":"one short description, mention song/artist if relevant","seq":["C","G"]}]}
Give 3 results. Each seq must be 2 or 3 chords from the allowed list. Keep them genuinely playable and beginner-friendly.`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data=await r.json();
    let txt=data.content.filter(x=>x.type==='text').map(x=>x.text).join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    const res=(parsed.results||[]).filter(s=>Array.isArray(s.seq)&&s.seq.every(c=>CHORDS[c]));
    if(!res.length){out.innerHTML='<div class="err">Couldn\'t map that to known chords. Try a genre or mood instead.</div>';return;}
    out.innerHTML='';
    const grid=document.createElement('div');grid.className='suggrid';
    res.forEach(s=>{
      const d=document.createElement('div');d.className='sugg';
      d.innerHTML=`<div class="t">${s.t}</div><div class="c">${s.c}</div><div class="seq">${s.seq.join(' → ')}</div>`;
      d.onclick=()=>loadSeq(s.seq);
      grid.appendChild(d);
    });
    out.appendChild(grid);
  }catch(e){
    out.innerHTML='<div class="err">Hmm, couldn\'t reach the Composer. Try Quick Picks above.</div>';
  }
}

/* ---------- TUNER ---------- */
const UKE_STRINGS=[
  {name:"G",freq:392.00,label:"4th"},
  {name:"C",freq:261.63,label:"3rd"},
  {name:"E",freq:329.63,label:"2nd"},
  {name:"A",freq:440.00,label:"1st"}
];
const NOTE_NAMES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
let tunerStream=null, tunerAC=null, analyser=null, tunerBuf=null, tunerRAF=null;
let micOn=false, autoMode=true, targetIdx=null;

const els={
  overlay:document.getElementById('tunerOverlay'),
  bigStrings:document.getElementById('bigStrings'),
  noteBig:document.getElementById('noteBig'),
  cents:document.getElementById('centsLbl'),
  needle:document.getElementById('needle'),
  strings:document.getElementById('strings'),
  freq:document.getElementById('freqReadout'),
  micToggle:document.getElementById('micToggle'),
  autoBtn:document.getElementById('autoBtn'),
  modeLbl:document.getElementById('tunerMode'),
  errBox:document.getElementById('micErrBox'),
  ticks:document.getElementById('ticks')
};

// ticks
(function(){let h='';for(let i=0;i<=10;i++){h+=`<span style="left:${i*10}%"></span>`;}els.ticks.innerHTML=h;})();

function buildStringBtns(){
  // big primary tap-to-hear buttons (mic-free tuning)
  if(els.bigStrings){
    els.bigStrings.innerHTML='';
    UKE_STRINGS.forEach((s)=>{
      const b=document.createElement('button');
      b.className='bigStr';
      b.innerHTML=`<span class="bn">${s.name}</span><span class="bl">${s.label} string</span><span class="bf">${s.freq.toFixed(0)} Hz</span>`;
      b.onclick=()=>{
        ctx().resume();
        // sustained, clear reference tone to tune against
        const t=ctx().currentTime;
        playTone(s.freq, t, 1.8);
        b.classList.add('ring');
        setTimeout(()=>b.classList.remove('ring'),1800);
      };
      els.bigStrings.appendChild(b);
    });
  }
  // mic-mode small buttons (inside the disclosure)
  els.strings.innerHTML='';
  UKE_STRINGS.forEach((s,i)=>{
    const b=document.createElement('button');
    b.innerHTML=`${s.name}<small>${s.label}</small>`;
    b.dataset.i=i;
    b.onclick=()=>{
      ctx().resume();const t=ctx().currentTime;playTone(s.freq,t,1.4);
      autoMode=false;targetIdx=i;refreshStringBtns();
      els.modeLbl.textContent="Target: "+s.name+" string ("+s.freq.toFixed(1)+" Hz)";
    };
    els.strings.appendChild(b);
  });
  refreshStringBtns();
}
function refreshStringBtns(){
  [...els.strings.children].forEach((b,i)=>{
    b.classList.toggle('auto',autoMode);
    b.classList.toggle('target',!autoMode&&i===targetIdx);
    b.classList.remove('lit');
  });
}

function freqToNote(freq){
  const midi=Math.round(69+12*Math.log2(freq/440));
  const refFreq=440*Math.pow(2,(midi-69)/12);
  const cents=Math.round(1200*Math.log2(freq/refFreq));
  const name=NOTE_NAMES[(midi%12+12)%12];
  return {name,cents,midi};
}
// nearest uke string to a detected freq
function nearestString(freq){
  let best=0,bd=1e9;
  UKE_STRINGS.forEach((s,i)=>{const d=Math.abs(1200*Math.log2(freq/s.freq));if(d<bd){bd=d;best=i;}});
  return best;
}

// autocorrelation pitch detection
function detectPitch(buf,sampleRate){
  const SIZE=buf.length;
  let rms=0;for(let i=0;i<SIZE;i++){rms+=buf[i]*buf[i];}
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.01)return -1; // too quiet
  let r1=0,r2=SIZE-1,thres=0.2;
  for(let i=0;i<SIZE/2;i++){if(Math.abs(buf[i])<thres){r1=i;break;}}
  for(let i=1;i<SIZE/2;i++){if(Math.abs(buf[SIZE-i])<thres){r2=SIZE-i;break;}}
  const b=buf.slice(r1,r2);const n=b.length;
  const c=new Array(n).fill(0);
  for(let lag=0;lag<n;lag++){for(let i=0;i<n-lag;i++){c[lag]+=b[i]*b[i+lag];}}
  let d=0;while(c[d]>c[d+1])d++;
  let maxval=-1,maxpos=-1;
  for(let i=d;i<n;i++){if(c[i]>maxval){maxval=c[i];maxpos=i;}}
  let T0=maxpos;
  // parabolic interpolation
  const x1=c[T0-1]||0,x2=c[T0]||0,x3=c[T0+1]||0;
  const a=(x1+x3-2*x2)/2,bb=(x3-x1)/2;
  if(a)T0=T0-bb/(2*a);
  return sampleRate/T0;
}

function tunerLoop(){
  if(!micOn)return;
  analyser.getFloatTimeDomainData(tunerBuf);
  const freq=detectPitch(tunerBuf,tunerAC.sampleRate);
  if(freq>50&&freq<2000){
    const info=freqToNote(freq);
    // which string we're judging against
    const sIdx = autoMode ? nearestString(freq) : targetIdx;
    const target=UKE_STRINGS[sIdx];
    const centsOff=Math.round(1200*Math.log2(freq/target.freq));
    const display=autoMode?info.name:target.name;

    els.noteBig.textContent=display;
    els.freq.textContent=freq.toFixed(1)+" Hz  →  target "+target.name+" "+target.freq.toFixed(1)+" Hz";

    // needle: clamp ±50 cents to 0–100% of bar
    const clamped=Math.max(-50,Math.min(50,centsOff));
    els.needle.style.left=(50+clamped)+"%";

    const inTune=Math.abs(centsOff)<=5;
    els.noteBig.classList.toggle('inTune',inTune);
    els.needle.style.background=inTune?"var(--good)":(Math.abs(centsOff)<15?"var(--warn)":"var(--bad)");
    if(inTune){els.cents.textContent="✓ In tune!";}
    else{els.cents.textContent=(centsOff>0?"+":"")+centsOff+" cents "+(centsOff>0?"(too sharp ↓ loosen)":"(too flat ↑ tighten)");}

    // light up matching string
    [...els.strings.children].forEach((b,i)=>b.classList.toggle('lit',i===sIdx&&inTune));
  }else{
    els.cents.textContent="listening... pluck a string";
    els.noteBig.classList.remove('inTune');
  }
  tunerRAF=requestAnimationFrame(tunerLoop);
}

async function startMic(){
  els.errBox.innerHTML='';
  // mic requires a secure context (https or localhost). Local file:// and content:// are blocked by the browser.
  if(!window.isSecureContext || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    els.errBox.innerHTML='<div class="micErr">Microphone is blocked because this page isn\'t served over https. Opening the file from Downloads (file:// or content://) disables mic access — a browser security rule.<br><br>To use the auto-tuner: host the file on an https link (e.g. drag it onto netlify.com/drop) and open that. Meanwhile, tap a string below to hear its reference tone and tune by ear.</div>';
    return;
  }
  try{
    tunerStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    tunerAC=new (window.AudioContext||window.webkitAudioContext)();
    const src=tunerAC.createMediaStreamSource(tunerStream);
    analyser=tunerAC.createAnalyser();
    analyser.fftSize=2048;
    tunerBuf=new Float32Array(analyser.fftSize);
    src.connect(analyser);
    micOn=true;
    els.micToggle.textContent="Stop mic";
    els.micToggle.classList.remove('play');els.micToggle.classList.add('stop');
    tunerLoop();
  }catch(e){
    const denied=/NotAllowed|Permission/i.test(e&&e.name||'');
    els.errBox.innerHTML='<div class="micErr">'+(denied
      ? 'Mic permission was denied. Enable microphone access for this page in your browser settings, then try again.'
      : 'Mic unavailable here. Tap a string below to hear a reference tone and tune by ear.')+'</div>';
  }
}
function stopMic(){
  micOn=false;cancelAnimationFrame(tunerRAF);
  if(tunerStream){tunerStream.getTracks().forEach(t=>t.stop());tunerStream=null;}
  if(tunerAC){tunerAC.close();tunerAC=null;}
  els.micToggle.textContent="Start mic";
  els.micToggle.classList.add('play');els.micToggle.classList.remove('stop');
  els.noteBig.textContent="—";els.cents.textContent="mic stopped";
  els.needle.style.left="50%";els.freq.textContent="";
  [...els.strings.children].forEach(b=>b.classList.remove('lit'));
}
els.micToggle.onclick=()=>micOn?stopMic():startMic();
els.autoBtn.onclick=()=>{autoMode=true;targetIdx=null;refreshStringBtns();els.modeLbl.textContent="Auto-detect · pluck any string";};

document.getElementById('tunerOpen').onclick=()=>{els.overlay.classList.add('show');buildStringBtns();};
document.getElementById('tunerClose').onclick=()=>{els.overlay.classList.remove('show');stopMic();};
document.getElementById('micWrap').addEventListener('toggle',function(){ if(!this.open) stopMic(); });
els.overlay.onclick=(e)=>{if(e.target===els.overlay){els.overlay.classList.remove('show');stopMic();}};

/* ---------- CHORD SUGGESTIONS ---------- */
// Common companion chords per chord (built from popular major/minor-key moves).
// Each entry: chords that frequently FOLLOW the key chord in well-known progressions.
const SUGGEST_MAP={
  // Major chords -> common next chords (I->IV,V,vi,ii etc.)
  C:["G","Am","F","Em","Dm"],
  G:["C","D","Em","Am","D7"],
  D:["G","A","Bm","Em","A7"],
  A:["D","E","F#m","Bm","E7"],
  E:["A","B","C#m","F#m","B7"],
  F:["C","G","Dm","Bb","Am"],
  B:["E","F#","G#m","C#m","F#7"],
  // Minor chords -> common next chords (i->VI,VII,iv,v etc.)
  Am:["F","G","C","Dm","E7"],
  Em:["C","G","D","Am","B7"],
  Dm:["G","C","F","Am","A7"],
  Bm:["G","A","D","Em","F#7"],
  Gm:["F","Eb","Cm","D7","Bb"],
  Cm:["G7","Ab","Fm","Eb","Bb"],
  Fm:["C7","Db","Bbm","Ab","Eb"],
  // 7ths -> resolve
  G7:["C","Am","F","Em"],
  C7:["F","Dm","G","Am"],
  D7:["G","Em","C","Bm"],
  A7:["D","Bm","G","F#m"],
  E7:["A","C#m","F#m","B7"],
  F7:["Bb","Dm","C","Gm"],
  B7:["E","G#m","C#m","F#m"]
};
// fallback if chord not in map: offer its same-family neighbors
function suggestFor(chord){
  if(SUGGEST_MAP[chord]) return SUGGEST_MAP[chord];
  // try the major/minor base
  const base=chord.replace(/(maj7|m7|7)$/,'');
  if(SUGGEST_MAP[base]) return SUGGEST_MAP[base];
  return ["C","G","Am","F"];
}
// score candidates by how many existing chords also suggest them, then keep playable ones
function suggestNext(seq){
  if(seq.length===0) return [];
  const last=seq[seq.length-1];
  const score={};
  // primary: what the last chord leads to
  suggestFor(last).forEach((c,i)=>{score[c]=(score[c]||0)+(10-i);});
  // secondary: chords suggested by the whole progression (reinforces a key)
  seq.forEach(ch=>suggestFor(ch).forEach((c,i)=>{score[c]=(score[c]||0)+(4-Math.min(i,3));}));
  // remove chords already the current last (avoid immediate repeat) and keep only known shapes
  return Object.keys(score)
    .filter(c=>CHORDS[c] && c!==last)
    .sort((a,b)=>score[b]-score[a])
    .slice(0,5);
}

const suggestEl=document.getElementById('suggest');
function renderSuggest(){
  if(!suggestEl)return;
  if(progression.length===0){ suggestEl.innerHTML=''; return; }
  const picks=suggestNext(progression);
  if(picks.length===0){ suggestEl.innerHTML=''; return; }
  const n=progression.length;
  const label = n===1 ? "Add a 2nd chord:"
              : n===2 ? "Add a 3rd chord:"
              : n===3 ? "Add a 4th chord:"
              : "Next chord:";
  let html=`<div class="suggLbl">${label}</div><div class="suggRow">`;
  picks.forEach(c=>{ html+=`<button class="suggBtn" data-c="${c}">${c}</button>`; });
  html+=`</div>`;
  suggestEl.innerHTML=html;
  suggestEl.querySelectorAll('.suggBtn').forEach(b=>{
    b.onclick=()=>{ addChord(b.dataset.c); strumTap(b.dataset.c); };
  });
}
