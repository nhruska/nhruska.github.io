<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0f12">
<title>Backing Tracks - Music</title>
<link rel="icon" href="https://problemsolutions.github.io/logo-badge.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="../play/icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Backing Tracks">
<!-- Shared songbook styles (theme + components). -->
<link rel="stylesheet" href="../shared/songbook.css">
<style>
  /* backing-tracks finder (Phase 1) - compact one-row filters */
  .bt-controls{margin:2px 0 4px;}
  .bt-bar{display:flex;align-items:center;gap:9px;margin:5px 0;}
  .bt-tag{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--txt-dim);flex:0 0 auto;width:30px;text-align:right;}
  .bt-bar .chips{margin-bottom:0;flex:1;min-width:0;}     /* shared .chips already scrolls on one row */
  .bt-bar .chip{padding:6px 12px;}
  .bt-mode{flex:0 0 auto;display:flex;gap:5px;margin-left:2px;}
  .bt-mode .chip{padding:6px 9px;font-size:.68rem;}
  .bt-why{display:inline-block;margin-top:8px;font-family:'Space Mono',monospace;font-size:.6rem;
    letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:var(--accent-deep);
    border:1px solid var(--accent-dim);padding:3px 7px;border-radius:6px;}
  .bt-count{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--txt-dim);margin:3px 2px 9px;}
  .bt-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .bt-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
  .bt-card.tap{cursor:pointer;transition:border-color .12s,transform .08s,background .12s;}
  .bt-card.tap:hover{border-color:var(--line-strong);background:var(--surface-2);}
  .bt-card.tap:active{transform:scale(.99);}
  .bt-meta{align-items:center;}
  .bt-meta .bt-open{border:none;padding:0;margin-left:auto;color:var(--accent);font-weight:700;}
  .bt-more{margin:14px 0 6px;}
  .bt-more-btn{width:100%;background:transparent;border:1px dashed var(--line-strong);color:var(--txt-soft);
    font-family:inherit;font-weight:600;font-size:.84rem;padding:12px;border-radius:12px;cursor:pointer;
    transition:border-color .15s,color .15s;}
  .bt-more-btn:hover{border-color:var(--accent);color:var(--accent);}
  .bt-more-btn .ar{color:var(--accent);}
  /* curate form */
  .bt-add{margin:12px 0 6px;}
  .bt-add-toggle{background:transparent;border:1px solid var(--line);color:var(--txt-dim);font-family:inherit;
    font-weight:600;font-size:.8rem;padding:9px 14px;border-radius:10px;cursor:pointer;}
  .bt-add-toggle:hover{color:var(--accent);border-color:var(--line-strong);}
  .bt-add-panel{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:13px;
    padding:13px;display:flex;flex-direction:column;gap:9px;}
  .bt-add-panel[hidden]{display:none;}
  .bt-in{width:100%;background:var(--bg-2);border:1px solid var(--line-strong);color:var(--txt);
    font-family:inherit;font-size:.88rem;padding:10px 12px;border-radius:9px;}
  .bt-in:focus{outline:none;border-color:var(--accent);}
  .bt-in.bad{border-color:#f87171;}
  .bt-add-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .bt-add-actions{display:flex;gap:9px;align-items:center;}
  .bt-add-save{flex:1;background:var(--accent);color:#06201c;border:none;font-family:inherit;font-weight:700;
    font-size:.86rem;padding:11px;border-radius:10px;cursor:pointer;}
  .bt-add-cancel{background:transparent;border:none;color:var(--txt-dim);font-family:inherit;font-weight:600;
    font-size:.82rem;cursor:pointer;padding:8px;}
  /* player overlay */
  .bt-player{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.78);padding:16px;}
  .bt-player.on{display:flex;}
  .bt-pl-box{width:100%;max-width:760px;background:var(--surface);border:1px solid var(--line-strong);
    border-radius:14px;overflow:hidden;}
  .bt-pl-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;}
  .bt-pl-t{font-weight:700;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bt-pl-x{background:transparent;border:1px solid var(--line-strong);color:var(--txt-soft);font-family:inherit;
    font-weight:600;font-size:.78rem;padding:7px 12px;border-radius:9px;cursor:pointer;flex:0 0 auto;}
  .bt-pl-x:hover{color:var(--accent);border-color:var(--accent);}
  .bt-pl-frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;}
  .bt-pl-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .bt-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .bt-title{font-weight:700;font-size:1rem;letter-spacing:-.01em;}
  .bt-key{font-family:'Space Mono',monospace;font-weight:700;color:var(--accent);font-size:.84rem;flex:0 0 auto;}
  .bt-sub{color:var(--txt-soft);font-size:.82rem;margin-top:3px;}
  .bt-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;font-family:'Space Mono',monospace;font-size:.66rem;color:var(--txt-dim);}
  .bt-meta span{border:1px solid var(--line);padding:3px 7px;border-radius:6px;}
  .bt-empty{text-align:center;color:var(--txt-dim);padding:34px 18px;line-height:1.7;}
  .bt-empty .sub{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.04em;color:var(--txt-dim);opacity:.8;}
</style>
</head>
<body>
<div class="app">
  <div class="appbar">
    <div class="brand"><span class="nm">Backing Tracks</span><span class="ctx" id="ctx">find a track in your key</span></div>
    <div class="abRight">
      <a class="ab-btn" href="../" title="Music launcher" aria-label="Back to Music launcher">&larr;</a>
    </div>
  </div>
  <div class="view">
    <section class="screen on" id="finder">
      <div class="bt-controls">
        <div class="bt-bar"><span class="bt-tag">genre</span><div class="chips" id="genreChips"></div></div>
        <div class="bt-bar"><span class="bt-tag">key</span><div class="chips" id="keyChips"></div><div class="bt-mode" id="modeToggle"></div></div>
      </div>
      <div class="bt-count" id="resultCount"></div>
      <div class="bt-results" id="results"></div>
      <div class="bt-more" id="more"></div>
      <div class="bt-add">
        <button class="bt-add-toggle" id="addToggle" type="button">+ add a track</button>
        <div class="bt-add-panel" id="addPanel" hidden>
          <input id="aUrl" class="bt-in" placeholder="Paste a YouTube URL" autocomplete="off">
          <input id="aTitle" class="bt-in" placeholder="Title" autocomplete="off">
          <div class="bt-add-grid">
            <input id="aKey" class="bt-in" placeholder="Key (A, C#...)" autocomplete="off">
            <select id="aMode" class="bt-in"><option value="major">major</option><option value="minor">minor</option></select>
            <input id="aGenre" class="bt-in" placeholder="Genre" autocomplete="off">
            <input id="aBpm" class="bt-in" placeholder="BPM" inputmode="numeric" autocomplete="off">
          </div>
          <div class="bt-add-actions">
            <button id="aSave" class="bt-add-save" type="button">Save to my library</button>
            <button id="aCancel" class="bt-add-cancel" type="button">cancel</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
<div class="bt-player" id="player" aria-hidden="true"></div>
<script src="app.js"></script>
</body>
</html>
